syntax = "proto3";
package OCPI.v221.types;
option go_package = "tmp/v221/types;types";
option csharp_namespace = "OCPI.v221.types";

import "types/ocpi_2_2_1_commands_reserve_now_request_token.proto";

message ocpi_2_2_1_commands_reserve_now_request {
  string response_url = 1;
  OCPI.v221.types.ocpi_2_2_1_commands_reserve_now_request_token token = 2;
  string expiry_date = 3;
  string reservation_id = 4;
  string location_id = 5;
  string evse_uid = 6;
  string authorization_reference = 7;
}
