syntax = "proto3";
package OCPI.v221.types;
option go_package = "tmp/v221/types;types";
option csharp_namespace = "OCPI.v221.types";

import "types/enums/ocpi_2_2_1_cdr_auth_method_enum.proto";
import "types/ocpi_2_2_1_cdr_cdr_location.proto";
import "types/ocpi_2_2_1_cdr_cdr_token.proto";
import "types/ocpi_2_2_1_cdr_charging_periods_item.proto";
import "types/ocpi_2_2_1_cdr_properties_tariffs_anyOf_0_items_properties_min_price_anyOf_0.proto";
import "types/ocpi_2_2_1_cdr_signed_data.proto";
import "types/ocpi_2_2_1_cdr_tariffs_item.proto";

message ocpi_2_2_1_cdr {
  string country_code = 1;
  string party_id = 2;
  string id = 3;
  string start_date_time = 4;
  string end_date_time = 5;
  string session_id = 6;
  OCPI.v221.types.ocpi_2_2_1_cdr_cdr_token cdr_token = 7;
  OCPI.v221.types.enums.ocpi_2_2_1_cdr_auth_method_enum.ocpi_2_2_1_cdr_auth_method_enum auth_method = 8;
  string authorization_reference = 9;
  OCPI.v221.types.ocpi_2_2_1_cdr_cdr_location cdr_location = 10;
  string meter_id = 11;
  string currency = 12;
  repeated OCPI.v221.types.ocpi_2_2_1_cdr_tariffs_item tariffs = 13;
  repeated OCPI.v221.types.ocpi_2_2_1_cdr_charging_periods_item charging_periods = 14;
