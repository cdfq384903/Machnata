  OCPI.v221.types.ocpi_2_2_1_cdr_properties_tariffs_anyOf_0_items_properties_min_price_anyOf_0 total_cost = 16;
  OCPI.v221.types.ocpi_2_2_1_cdr_properties_tariffs_anyOf_0_items_properties_min_price_anyOf_0 total_fixed_cost = 17;
  double total_energy = 18;
  OCPI.v221.types.ocpi_2_2_1_cdr_properties_tariffs_anyOf_0_items_properties_min_price_anyOf_0 total_energy_cost = 19;
  double total_time = 20;
  OCPI.v221.types.ocpi_2_2_1_cdr_properties_tariffs_anyOf_0_items_properties_min_price_anyOf_0 total_time_cost = 21;
  double total_parking_time = 22;
  OCPI.v221.types.ocpi_2_2_1_cdr_properties_tariffs_anyOf_0_items_properties_min_price_anyOf_0 total_parking_cost = 23;
  OCPI.v221.types.ocpi_2_2_1_cdr_properties_tariffs_anyOf_0_items_properties_min_price_anyOf_0 total_reservation_cost = 24;
  string remark = 25;
  string invoice_reference_id = 26;
  bool credit = 27;
  string credit_reference_id = 28;
  bool home_charging_compensation = 29;
  string last_updated = 30;
