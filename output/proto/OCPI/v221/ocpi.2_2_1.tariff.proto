syntax = "proto3";
package OCPI.v221;
option go_package = "tmp/v221;OCPIv221";
option csharp_namespace = "OCPI.v221";

import "types/enums/ocpi_2_2_1_tariff_type_enum.proto";
import "types/ocpi_2_2_1_tariff.proto";
import "types/ocpi_2_2_1_tariff_elements_item.proto";
import "types/ocpi_2_2_1_tariff_energy_mix.proto";
import "types/ocpi_2_2_1_tariff_min_price.proto";
import "types/ocpi_2_2_1_tariff_tariff_alt_text_item.proto";

message ocpi_2_2_1_tariff {
  // NOTE: This field is required by standard Spec.
  string id = 1;
  // NOTE: This field is required by standard Spec.
  string country_code = 2;
  // NOTE: This field is required by standard Spec.
  string party_id = 3;
  // NOTE: This field is required by standard Spec.
  string currency = 4;
  OCPI.v221.types.enums.ocpi_2_2_1_tariff_type_enum.ocpi_2_2_1_tariff_type_enum type = 5;
  repeated OCPI.v221.types.ocpi_2_2_1_tariff_tariff_alt_text_item tariff_alt_text = 6;
  string tariff_alt_url = 7;
  OCPI.v221.types.ocpi_2_2_1_tariff_min_price min_price = 8;
  OCPI.v221.types.ocpi_2_2_1_tariff max_price = 9;
  // NOTE: This field is required by standard Spec.
  repeated OCPI.v221.types.ocpi_2_2_1_tariff_elements_item elements = 10;
  OCPI.v221.types.ocpi_2_2_1_tariff_energy_mix energy_mix = 11;
  string start_date_time = 12;
  string end_date_time = 13;
  // NOTE: This field is required by standard Spec.
  string last_updated = 14;
}