syntax = "proto3";
package OCPI.v221;
option go_package = "tmp/v221;OCPIv221";
option csharp_namespace = "OCPI.v221";


message ocpi_2_2_1_tariff_partial {
  string id = 1;
  string country_code = 2;
  string party_id = 3;
  string currency = 4;
  string type = 5;
  string tariff_alt_text = 6;
  string tariff_alt_url = 7;
  string min_price = 8;
  string max_price = 9;
  string elements = 10;
  string energy_mix = 11;
  string start_date_time = 12;
  string end_date_time = 13;
  string last_updated = 14;
}