syntax = "proto3";
package OCPI.v221;
option go_package = "tmp/v221;OCPIv221";
option csharp_namespace = "OCPI.v221";


message ocpi_error {
  string data = 1;
  // NOTE: This field is required by standard Spec.
  int32 status_code = 2;
  string status_message = 3;
  // NOTE: This field is required by standard Spec.
  string timestamp = 4;
}