syntax = "proto3";
package OCPI.v22;
option go_package = "tmp/v22;OCPIv22";
option csharp_namespace = "OCPI.v22";


message ocpi_2_2_connector_partial {
  string id = 1;
  string standard = 2;
  string format = 3;
  string power_type = 4;
  string max_voltage = 5;
  string max_amperage = 6;
  string max_electric_power = 7;
  string tariff_ids = 8;
  string terms_and_conditions = 9;
  string last_updated = 10;
}