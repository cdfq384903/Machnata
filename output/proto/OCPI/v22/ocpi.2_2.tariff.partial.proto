syntax = "proto3";
package OCPI.v22;
option go_package = "tmp/v22;OCPIv22";
option csharp_namespace = "OCPI.v22";


message ocpi_2_2_tariff_partial {
  string country_code = 1;
  string party_id = 2;
  string id = 3;
  string currency = 4;
  string type = 5;
  string tariff_alt_text = 6;
  string tariff_alt_url = 7;
  string min_price = 8;
  string max_price = 9;
  string elements = 10;
  string start_date_time = 11;
  string end_date_time = 12;
  string energy_mix = 13;
  string last_updated = 14;
}