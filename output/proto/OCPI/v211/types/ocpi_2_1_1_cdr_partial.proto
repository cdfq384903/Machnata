syntax = "proto3";
package OCPI.v211.types;
option go_package = "tmp/v211/types;types";
option csharp_namespace = "OCPI.v211.types";


message ocpi_2_1_1_cdr_partial {
  string id = 1;
  string start_date_time = 2;
  string stop_date_time = 3;
  string auth_id = 4;
  string auth_method = 5;
  string location = 6;
  string meter_id = 7;
  string currency = 8;
  string tariffs = 9;
  string charging_periods = 10;
  string total_cost = 11;
  string total_energy = 12;
  string total_time = 13;
  string total_parking_time = 14;
  string remark = 15;
  string last_updated = 16;
}
