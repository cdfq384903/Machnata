syntax = "proto3";
package OCPI.v211.types;
option go_package = "tmp/v211/types;types";
option csharp_namespace = "OCPI.v211.types";


message ocpi_2_1_1_session_partial {
  string id = 1;
  string start_datetime = 2;
  string end_datetime = 3;
  string kwh = 4;
  string auth_id = 5;
  string auth_method = 6;
  string location = 7;
  string meter_id = 8;
  string currency = 9;
  string charging_periods = 10;
  string total_cost = 11;
  string status = 12;
  string last_updated = 13;
}
