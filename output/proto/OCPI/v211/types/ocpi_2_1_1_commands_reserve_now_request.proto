syntax = "proto3";
package OCPI.v211.types;
option go_package = "tmp/v211/types;types";
option csharp_namespace = "OCPI.v211.types";

import "types/ocpi_2_1_1_commands_reserve_now_request_token.proto";

message ocpi_2_1_1_commands_reserve_now_request {
