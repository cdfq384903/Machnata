syntax = "proto3";
package OCPI.v211;
option go_package = "tmp/v211;OCPIv211";
option csharp_namespace = "OCPI.v211";

import "types/ocpi_2_1_1_credentials_business_details.proto";

message ocpi_2_1_1_credentials {
  // NOTE: This field is required by standard Spec.
  string token = 1;
  // NOTE: This field is required by standard Spec.
  string url = 2;
  // NOTE: This field is required by standard Spec.
  OCPI.v211.types.ocpi_2_1_1_credentials_business_details business_details = 3;
  // NOTE: This field is required by standard Spec.
  string party_id = 4;
  // NOTE: This field is required by standard Spec.
  string country_code = 5;
}