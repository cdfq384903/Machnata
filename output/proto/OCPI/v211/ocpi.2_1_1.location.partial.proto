syntax = "proto3";
package OCPI.v211;
option go_package = "tmp/v211;OCPIv211";
option csharp_namespace = "OCPI.v211";


message ocpi_2_1_1_location_partial {
  string id = 1;
  string type = 2;
  string name = 3;
  string address = 4;
  string city = 5;
  string postal_code = 6;
  string country = 7;
  string coordinates = 8;
  string related_locations = 9;
  string evses = 10;
  string directions = 11;
  string operator = 12;
  string suboperator = 13;
  string owner = 14;
  string facilities = 15;
  string time_zone = 16;
  string opening_times = 17;
  string charging_when_closed = 18;
  string images = 19;
  string energy_mix = 20;
  string last_updated = 21;
}