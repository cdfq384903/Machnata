syntax = "proto3";
package OCPI.v211;
option go_package = "tmp/v211;OCPIv211";
option csharp_namespace = "OCPI.v211";

import "types/enums/ocpi_2_1_1_session_auth_method_enum.proto";
import "types/enums/ocpi_2_1_1_session_status_enum.proto";
import "types/ocpi_2_1_1_session_charging_periods_item.proto";
import "types/ocpi_2_1_1_session_location.proto";

message ocpi_2_1_1_session {
  // NOTE: This field is required by standard Spec.
  string id = 1;
  // NOTE: This field is required by standard Spec.
  string start_datetime = 2;
  string end_datetime = 3;
  // NOTE: This field is required by standard Spec.
  double kwh = 4;
  // NOTE: This field is required by standard Spec.
  string auth_id = 5;
  // NOTE: This field is required by standard Spec.
  OCPI.v211.types.enums.ocpi_2_1_1_session_auth_method_enum.ocpi_2_1_1_session_auth_method_enum auth_method = 6;
  // NOTE: This field is required by standard Spec.
  OCPI.v211.types.ocpi_2_1_1_session_location location = 7;
  string meter_id = 8;
  // NOTE: This field is required by standard Spec.
  string currency = 9;
  repeated OCPI.v211.types.ocpi_2_1_1_session_charging_periods_item charging_periods = 10;
  double total_cost = 11;
  // NOTE: This field is required by standard Spec.
  OCPI.v211.types.enums.ocpi_2_1_1_session_status_enum.ocpi_2_1_1_session_status_enum status = 12;
  // NOTE: This field is required by standard Spec.
  string last_updated = 13;
}