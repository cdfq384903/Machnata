syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/MolecularDefinition_Concatenated.proto";
import "types/MolecularDefinition_Extracted.proto";
import "types/MolecularDefinition_Literal.proto";
import "types/MolecularDefinition_Relative.proto";
import "types/MolecularDefinition_Repeated.proto";
import "types/string.proto";

message MolecularDefinition_Representation {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept focus = 4;
  repeated HL7.v600.types.CodeableConcept code = 5;
  HL7.v600.types.MolecularDefinition_Literal literal = 6;
  HL7.v600.types.Reference resolvable = 7;
  HL7.v600.types.MolecularDefinition_Extracted extracted = 8;
  HL7.v600.types.MolecularDefinition_Repeated repeated = 9;
  HL7.v600.types.MolecularDefinition_Concatenated concatenated = 10;
  HL7.v600.types.MolecularDefinition_Relative relative = 11;
}
