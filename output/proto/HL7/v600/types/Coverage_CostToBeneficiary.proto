syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/Coverage_Exception.proto";
import "types/string.proto";

message Coverage_CostToBeneficiary {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept type = 4;
  HL7.v600.types.CodeableConcept category = 5;
  HL7.v600.types.CodeableConcept network = 6;
  HL7.v600.types.CodeableConcept unit = 7;
  HL7.v600.types.CodeableConcept term = 8;
  HL7.v600.types.Quantity valueQuantity = 9;
  HL7.v600.types.Money valueMoney = 10;
  repeated HL7.v600.types.Coverage_Exception exception = 11;
}
