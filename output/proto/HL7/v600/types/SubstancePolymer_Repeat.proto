syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/SubstancePolymer_RepeatUnit.proto";
import "types/string.proto";

message SubstancePolymer_Repeat {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string averageMolecularFormula = 4;
  HL7.v600.types.Element shadow__averageMolecularFormula = 5 [json_name = "_averageMolecularFormula"];
  HL7.v600.types.CodeableConcept repeatUnitAmountType = 6;
  repeated HL7.v600.types.SubstancePolymer_RepeatUnit repeatUnit = 7;
}
