syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ImmunizationRecommendation_DateCriterion.proto";
import "types/markdown.proto";
import "types/string.proto";

message ImmunizationRecommendation_Recommendation {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.CodeableConcept vaccineCode = 4;
  repeated HL7.v600.types.CodeableConcept targetDisease = 5;
  repeated HL7.v600.types.CodeableConcept contraindicatedVaccineCode = 6;
  HL7.v600.types.CodeableConcept forecastStatus = 7;
  repeated HL7.v600.types.CodeableConcept forecastReason = 8;
  repeated HL7.v600.types.ImmunizationRecommendation_DateCriterion dateCriterion = 9;
  HL7.v600.types.markdown description = 10;
  HL7.v600.types.Element shadow__description = 11 [json_name = "_description"];
  HL7.v600.types.string series = 12;
  HL7.v600.types.Element shadow__series = 13 [json_name = "_series"];
  HL7.v600.types.CodeableConcept doseNumber = 14;
  HL7.v600.types.CodeableConcept seriesDoses = 15;
  repeated HL7.v600.types.Reference supportingImmunization = 16;
  repeated HL7.v600.types.Reference supportingPatientInformation = 17;
}
