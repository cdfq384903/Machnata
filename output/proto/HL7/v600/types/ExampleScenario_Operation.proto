syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ExampleScenario_ContainedInstance.proto";
import "types/boolean.proto";
import "types/markdown.proto";
import "types/string.proto";

message ExampleScenario_Operation {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Coding type = 4;
  HL7.v600.types.string title = 5;
  HL7.v600.types.Element shadow__title = 6 [json_name = "_title"];
  HL7.v600.types.string initiator = 7;
  HL7.v600.types.Element shadow__initiator = 8 [json_name = "_initiator"];
  HL7.v600.types.string receiver = 9;
  HL7.v600.types.Element shadow__receiver = 10 [json_name = "_receiver"];
  HL7.v600.types.markdown description = 11;
  HL7.v600.types.Element shadow__description = 12 [json_name = "_description"];
  HL7.v600.types.boolean initiatorActive = 13;
  HL7.v600.types.Element shadow__initiatorActive = 14 [json_name = "_initiatorActive"];
  HL7.v600.types.boolean receiverActive = 15;
  HL7.v600.types.Element shadow__receiverActive = 16 [json_name = "_receiverActive"];
  HL7.v600.types.ExampleScenario_ContainedInstance request = 17;
  HL7.v600.types.ExampleScenario_ContainedInstance response = 18;
}
