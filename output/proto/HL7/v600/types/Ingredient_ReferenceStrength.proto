syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message Ingredient_ReferenceStrength {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableReference substance = 4;
  HL7.v600.types.Ratio strengthRatio = 5;
  HL7.v600.types.RatioRange strengthRatioRange = 6;
  HL7.v600.types.Quantity strengthQuantity = 7;
  HL7.v600.types.string measurementPoint = 8;
  HL7.v600.types.Element shadow__measurementPoint = 9 [json_name = "_measurementPoint"];
  repeated HL7.v600.types.CodeableConcept country = 10;
}
