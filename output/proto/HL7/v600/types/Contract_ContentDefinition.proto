syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/code.proto";
import "types/dateTime.proto";
import "types/markdown.proto";
import "types/string.proto";

message Contract_ContentDefinition {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept type = 4;
  HL7.v600.types.CodeableConcept subType = 5;
  HL7.v600.types.Reference publisher = 6;
  HL7.v600.types.dateTime publicationDate = 7;
  HL7.v600.types.Element shadow__publicationDate = 8 [json_name = "_publicationDate"];
  HL7.v600.types.code publicationStatus = 9;
  HL7.v600.types.Element shadow__publicationStatus = 10 [json_name = "_publicationStatus"];
  HL7.v600.types.markdown copyright = 11;
  HL7.v600.types.Element shadow__copyright = 12 [json_name = "_copyright"];
}
