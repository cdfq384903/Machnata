syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message MessageHeader_Source {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  string endpointUrl = 4;
  HL7.v600.types.Element shadow__endpointUrl = 5 [json_name = "_endpointUrl"];
  HL7.v600.types.Reference endpointReference = 6;
  HL7.v600.types.string name = 7;
  HL7.v600.types.Element shadow__name = 8 [json_name = "_name"];
  HL7.v600.types.string software = 9;
  HL7.v600.types.Element shadow__software = 10 [json_name = "_software"];
  HL7.v600.types.string version = 11;
  HL7.v600.types.Element shadow__version = 12 [json_name = "_version"];
  HL7.v600.types.ContactPoint contact = 13;
  HL7.v600.types.Reference sender = 14;
}
