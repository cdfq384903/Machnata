syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/AdministrableProductDefinition_TargetSpecies.proto";
import "types/string.proto";

message AdministrableProductDefinition_RouteOfAdministration {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept code = 4;
  HL7.v600.types.Quantity firstDose = 5;
  HL7.v600.types.Quantity maxSingleDose = 6;
  HL7.v600.types.Quantity maxDosePerDay = 7;
  HL7.v600.types.Ratio maxDosePerTreatmentPeriod = 8;
  HL7.v600.types.Duration maxTreatmentPeriod = 9;
  repeated HL7.v600.types.AdministrableProductDefinition_TargetSpecies targetSpecies = 10;
}
