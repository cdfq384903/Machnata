syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message Encounter_Admission {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Identifier preAdmissionIdentifier = 4;
  HL7.v600.types.Reference origin = 5;
  HL7.v600.types.CodeableConcept admitSource = 6;
  HL7.v600.types.CodeableConcept reAdmission = 7;
  HL7.v600.types.Reference destination = 8;
  HL7.v600.types.CodeableConcept dischargeDisposition = 9;
}
