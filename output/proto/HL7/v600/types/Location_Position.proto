syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/decimal.proto";
import "types/string.proto";

message Location_Position {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.decimal longitude = 4;
  HL7.v600.types.Element shadow__longitude = 5 [json_name = "_longitude"];
  HL7.v600.types.decimal latitude = 6;
  HL7.v600.types.Element shadow__latitude = 7 [json_name = "_latitude"];
  HL7.v600.types.decimal altitude = 8;
  HL7.v600.types.Element shadow__altitude = 9 [json_name = "_altitude"];
}
