syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/code.proto";
import "types/string.proto";

message OperationOutcome_Issue {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.code severity = 4;
  HL7.v600.types.Element shadow__severity = 5 [json_name = "_severity"];
  HL7.v600.types.code code = 6;
  HL7.v600.types.Element shadow__code = 7 [json_name = "_code"];
  HL7.v600.types.CodeableConcept details = 8;
  HL7.v600.types.string diagnostics = 9;
  HL7.v600.types.Element shadow__diagnostics = 10 [json_name = "_diagnostics"];
  repeated HL7.v600.types.string location = 11;
  repeated HL7.v600.types.Element shadow__location = 12 [json_name = "_location"];
  repeated HL7.v600.types.string expression = 13;
  repeated HL7.v600.types.Element shadow__expression = 14 [json_name = "_expression"];
}
