syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/PlanDefinition_Target.proto";
import "types/string.proto";

message PlanDefinition_Goal {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept category = 4;
  HL7.v600.types.CodeableConcept description = 5;
  HL7.v600.types.CodeableConcept priority = 6;
  HL7.v600.types.CodeableConcept start = 7;
  repeated HL7.v600.types.CodeableConcept addresses = 8;
  repeated HL7.v600.types.RelatedArtifact documentation = 9;
  repeated HL7.v600.types.PlanDefinition_Target target = 10;
}
