syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/boolean.proto";
import "types/code.proto";
import "types/string.proto";

message SubscriptionTopic_QueryCriteria {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string previous = 4;
  HL7.v600.types.Element shadow__previous = 5 [json_name = "_previous"];
  HL7.v600.types.code resultForCreate = 6;
  HL7.v600.types.Element shadow__resultForCreate = 7 [json_name = "_resultForCreate"];
  HL7.v600.types.string current = 8;
  HL7.v600.types.Element shadow__current = 9 [json_name = "_current"];
  HL7.v600.types.code resultForDelete = 10;
  HL7.v600.types.Element shadow__resultForDelete = 11 [json_name = "_resultForDelete"];
  HL7.v600.types.boolean requireBoth = 12;
  HL7.v600.types.Element shadow__requireBoth = 13 [json_name = "_requireBoth"];
}
