syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ImplementationGuide_Grouping.proto";
import "types/ImplementationGuide_Page.proto";
import "types/ImplementationGuide_Parameter.proto";
import "types/ImplementationGuide_Resource.proto";
import "types/ImplementationGuide_Template.proto";
import "types/string.proto";

message ImplementationGuide_Definition {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.ImplementationGuide_Grouping grouping = 4;
  repeated HL7.v600.types.ImplementationGuide_Resource resource = 5;
  HL7.v600.types.ImplementationGuide_Page page = 6;
  repeated HL7.v600.types.ImplementationGuide_Parameter parameter = 7;
  repeated HL7.v600.types.ImplementationGuide_Template template = 8;
}
