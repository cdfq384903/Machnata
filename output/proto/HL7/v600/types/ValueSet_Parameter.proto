syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message ValueSet_Parameter {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string name = 4;
  HL7.v600.types.Element shadow__name = 5 [json_name = "_name"];
  string valueString = 6;
  HL7.v600.types.Element shadow__valueString = 7 [json_name = "_valueString"];
  bool valueBoolean = 8;
  HL7.v600.types.Element shadow__valueBoolean = 9 [json_name = "_valueBoolean"];
  double valueInteger = 10;
  HL7.v600.types.Element shadow__valueInteger = 11 [json_name = "_valueInteger"];
  double valueDecimal = 12;
  HL7.v600.types.Element shadow__valueDecimal = 13 [json_name = "_valueDecimal"];
  string valueUri = 14;
  HL7.v600.types.Element shadow__valueUri = 15 [json_name = "_valueUri"];
  string valueCode = 16;
  HL7.v600.types.Element shadow__valueCode = 17 [json_name = "_valueCode"];
  string valueDateTime = 18;
  HL7.v600.types.Element shadow__valueDateTime = 19 [json_name = "_valueDateTime"];
}
