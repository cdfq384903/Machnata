syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/PlanDefinition_Condition.proto";
import "types/PlanDefinition_DynamicValue.proto";
import "types/PlanDefinition_Input.proto";
import "types/PlanDefinition_Output.proto";
import "types/PlanDefinition_Participant.proto";
import "types/PlanDefinition_RelatedAction.proto";
import "types/canonical.proto";
import "types/code.proto";
import "types/markdown.proto";
import "types/string.proto";

message PlanDefinition_Action {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string linkId = 4;
  HL7.v600.types.Element shadow__linkId = 5 [json_name = "_linkId"];
  HL7.v600.types.string prefix = 6;
  HL7.v600.types.Element shadow__prefix = 7 [json_name = "_prefix"];
  HL7.v600.types.string title = 8;
  HL7.v600.types.Element shadow__title = 9 [json_name = "_title"];
  HL7.v600.types.markdown description = 10;
  HL7.v600.types.Element shadow__description = 11 [json_name = "_description"];
  HL7.v600.types.markdown textEquivalent = 12;
  HL7.v600.types.Element shadow__textEquivalent = 13 [json_name = "_textEquivalent"];
  HL7.v600.types.code priority = 14;
  HL7.v600.types.Element shadow__priority = 15 [json_name = "_priority"];
  HL7.v600.types.CodeableConcept code = 16;
  repeated HL7.v600.types.CodeableConcept reason = 17;
  repeated HL7.v600.types.RelatedArtifact documentation = 18;
  repeated HL7.v600.types.string goalId = 19;
  repeated HL7.v600.types.Element shadow__goalId = 20 [json_name = "_goalId"];
  HL7.v600.types.CodeableConcept subjectCodeableConcept = 21;
  HL7.v600.types.Reference subjectReference = 22;
  string subjectCanonical = 23;
  HL7.v600.types.Element shadow__subjectCanonical = 24 [json_name = "_subjectCanonical"];
  repeated HL7.v600.types.TriggerDefinition trigger = 25;
  repeated HL7.v600.types.PlanDefinition_Condition condition = 26;
  repeated HL7.v600.types.PlanDefinition_Input input = 27;
  repeated HL7.v600.types.PlanDefinition_Output output = 28;
  repeated HL7.v600.types.PlanDefinition_RelatedAction relatedAction = 29;
  HL7.v600.types.Age timingAge = 30;
  HL7.v600.types.Duration timingDuration = 31;
  HL7.v600.types.Range timingRange = 32;
  HL7.v600.types.Timing timingTiming = 33;
  HL7.v600.types.CodeableReference location = 34;
  repeated HL7.v600.types.PlanDefinition_Participant participant = 35;
  HL7.v600.types.CodeableConcept type = 36;
  HL7.v600.types.code groupingBehavior = 37;
  HL7.v600.types.Element shadow__groupingBehavior = 38 [json_name = "_groupingBehavior"];
  HL7.v600.types.code selectionBehavior = 39;
  HL7.v600.types.Element shadow__selectionBehavior = 40 [json_name = "_selectionBehavior"];
  HL7.v600.types.code requiredBehavior = 41;
  HL7.v600.types.Element shadow__requiredBehavior = 42 [json_name = "_requiredBehavior"];
  HL7.v600.types.code precheckBehavior = 43;
  HL7.v600.types.Element shadow__precheckBehavior = 44 [json_name = "_precheckBehavior"];
  HL7.v600.types.code cardinalityBehavior = 45;
  HL7.v600.types.Element shadow__cardinalityBehavior = 46 [json_name = "_cardinalityBehavior"];
  string definitionCanonical = 47;
  HL7.v600.types.Element shadow__definitionCanonical = 48 [json_name = "_definitionCanonical"];
  string definitionUri = 49;
  HL7.v600.types.Element shadow__definitionUri = 50 [json_name = "_definitionUri"];
  HL7.v600.types.canonical transform = 51;
  repeated HL7.v600.types.PlanDefinition_DynamicValue dynamicValue = 52;
  repeated HL7.v600.types.PlanDefinition_Action action = 53;
}
