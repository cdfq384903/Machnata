syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/MolecularDefinition_CytobandLocation.proto";
import "types/MolecularDefinition_SequenceLocation.proto";
import "types/string.proto";

message MolecularDefinition_Location {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.MolecularDefinition_SequenceLocation sequenceLocation = 4;
  HL7.v600.types.MolecularDefinition_CytobandLocation cytobandLocation = 5;
}
