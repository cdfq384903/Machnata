syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/dateTime.proto";
import "types/string.proto";

message VerificationResult_PrimarySource {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Reference who = 4;
  repeated HL7.v600.types.CodeableConcept type = 5;
  repeated HL7.v600.types.CodeableConcept communicationMethod = 6;
  HL7.v600.types.CodeableConcept validationStatus = 7;
  HL7.v600.types.dateTime validationDate = 8;
  HL7.v600.types.Element shadow__validationDate = 9 [json_name = "_validationDate"];
  HL7.v600.types.CodeableConcept canPushUpdates = 10;
  repeated HL7.v600.types.CodeableConcept pushTypeAvailable = 11;
}
