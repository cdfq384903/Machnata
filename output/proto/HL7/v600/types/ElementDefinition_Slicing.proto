syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ElementDefinition_Discriminator.proto";
import "types/boolean.proto";
import "types/enums/ElementDefinition_Slicing_rules_enum.proto";
import "types/string.proto";

message ElementDefinition_Slicing {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.ElementDefinition_Discriminator discriminator = 4;
  HL7.v600.types.string description = 5;
  HL7.v600.types.Element shadow__description = 6 [json_name = "_description"];
  HL7.v600.types.boolean ordered = 7;
  HL7.v600.types.Element shadow__ordered = 8 [json_name = "_ordered"];
  HL7.v600.types.enums.elementdefinition_slicing_rules_enum.ElementDefinition_Slicing_rules_enum rules = 9;
  HL7.v600.types.Element shadow__rules = 10 [json_name = "_rules"];
}
