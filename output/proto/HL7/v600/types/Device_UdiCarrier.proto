syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/base64Binary.proto";
import "types/code.proto";
import "types/string.proto";
import "types/uri.proto";

message Device_UdiCarrier {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string deviceIdentifier = 4;
  HL7.v600.types.Element shadow__deviceIdentifier = 5 [json_name = "_deviceIdentifier"];
  HL7.v600.types.uri deviceIdentifierSystem = 6;
  HL7.v600.types.Element shadow__deviceIdentifierSystem = 7 [json_name = "_deviceIdentifierSystem"];
  HL7.v600.types.uri issuer = 8;
  HL7.v600.types.Element shadow__issuer = 9 [json_name = "_issuer"];
  HL7.v600.types.uri jurisdiction = 10;
  HL7.v600.types.Element shadow__jurisdiction = 11 [json_name = "_jurisdiction"];
  HL7.v600.types.base64Binary carrierAIDC = 12;
  HL7.v600.types.Element shadow__carrierAIDC = 13 [json_name = "_carrierAIDC"];
  HL7.v600.types.string carrierHRF = 14;
  HL7.v600.types.Element shadow__carrierHRF = 15 [json_name = "_carrierHRF"];
  HL7.v600.types.code entryType = 16;
  HL7.v600.types.Element shadow__entryType = 17 [json_name = "_entryType"];
}
