syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/boolean.proto";
import "types/string.proto";

message CoverageEligibilityRequest_Insurance {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.boolean focal = 4;
  HL7.v600.types.Element shadow__focal = 5 [json_name = "_focal"];
  HL7.v600.types.Reference coverage = 6;
  HL7.v600.types.string businessArrangement = 7;
  HL7.v600.types.Element shadow__businessArrangement = 8 [json_name = "_businessArrangement"];
}
