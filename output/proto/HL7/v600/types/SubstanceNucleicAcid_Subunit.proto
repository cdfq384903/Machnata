syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/SubstanceNucleicAcid_Linkage.proto";
import "types/SubstanceNucleicAcid_Sugar.proto";
import "types/integer.proto";
import "types/string.proto";

message SubstanceNucleicAcid_Subunit {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.integer subunit = 4;
  HL7.v600.types.Element shadow__subunit = 5 [json_name = "_subunit"];
  HL7.v600.types.string sequence = 6;
  HL7.v600.types.Element shadow__sequence = 7 [json_name = "_sequence"];
  HL7.v600.types.integer length = 8;
  HL7.v600.types.Element shadow__length = 9 [json_name = "_length"];
  HL7.v600.types.Attachment sequenceAttachment = 10;
  HL7.v600.types.CodeableConcept fivePrime = 11;
  HL7.v600.types.CodeableConcept threePrime = 12;
  repeated HL7.v600.types.SubstanceNucleicAcid_Linkage linkage = 13;
  repeated HL7.v600.types.SubstanceNucleicAcid_Sugar sugar = 14;
}
