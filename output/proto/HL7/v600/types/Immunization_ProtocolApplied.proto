syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message Immunization_ProtocolApplied {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string series = 4;
  HL7.v600.types.Element shadow__series = 5 [json_name = "_series"];
  HL7.v600.types.Reference authority = 6;
  repeated HL7.v600.types.CodeableConcept targetDisease = 7;
  HL7.v600.types.CodeableConcept doseNumber = 8;
  HL7.v600.types.CodeableConcept seriesDoses = 9;
}
