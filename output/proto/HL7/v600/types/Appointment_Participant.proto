syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/boolean.proto";
import "types/code.proto";
import "types/string.proto";

message Appointment_Participant {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.CodeableConcept type = 4;
  HL7.v600.types.Period period = 5;
  HL7.v600.types.Reference actor = 6;
  HL7.v600.types.boolean required = 7;
  HL7.v600.types.Element shadow__required = 8 [json_name = "_required"];
  HL7.v600.types.code status = 9;
  HL7.v600.types.Element shadow__status = 10 [json_name = "_status"];
}
