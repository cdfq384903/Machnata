syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/boolean.proto";
import "types/canonical.proto";
import "types/enums/ElementDefinition_Constraint_severity_enum.proto";
import "types/id.proto";
import "types/markdown.proto";
import "types/string.proto";

message ElementDefinition_Constraint {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.id key = 4;
  HL7.v600.types.Element shadow__key = 5 [json_name = "_key"];
  HL7.v600.types.markdown requirements = 6;
  HL7.v600.types.Element shadow__requirements = 7 [json_name = "_requirements"];
  HL7.v600.types.enums.elementdefinition_constraint_severity_enum.ElementDefinition_Constraint_severity_enum severity = 8;
  HL7.v600.types.Element shadow__severity = 9 [json_name = "_severity"];
  HL7.v600.types.boolean suppress = 10;
  HL7.v600.types.Element shadow__suppress = 11 [json_name = "_suppress"];
  HL7.v600.types.string human = 12;
  HL7.v600.types.Element shadow__human = 13 [json_name = "_human"];
  HL7.v600.types.string expression = 14;
  HL7.v600.types.Element shadow__expression = 15 [json_name = "_expression"];
  HL7.v600.types.canonical source = 16;
}
