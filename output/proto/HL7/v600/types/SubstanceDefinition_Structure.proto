syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/SubstanceDefinition_MolecularWeight.proto";
import "types/SubstanceDefinition_Representation.proto";
import "types/string.proto";

message SubstanceDefinition_Structure {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept stereochemistry = 4;
  HL7.v600.types.CodeableConcept opticalActivity = 5;
  HL7.v600.types.string molecularFormula = 6;
  HL7.v600.types.Element shadow__molecularFormula = 7 [json_name = "_molecularFormula"];
  HL7.v600.types.string molecularFormulaByMoiety = 8;
  HL7.v600.types.Element shadow__molecularFormulaByMoiety = 9 [json_name = "_molecularFormulaByMoiety"];
  HL7.v600.types.SubstanceDefinition_MolecularWeight molecularWeight = 10;
  repeated HL7.v600.types.CodeableConcept technique = 11;
  repeated HL7.v600.types.Reference sourceDocument = 12;
  repeated HL7.v600.types.SubstanceDefinition_Representation representation = 13;
}
