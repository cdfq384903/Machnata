syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/enums/Contributor_type_enum.proto";
import "types/string.proto";

message Contributor {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  HL7.v600.types.enums.contributor_type_enum.Contributor_type_enum type = 3;
  HL7.v600.types.Element shadow__type = 4 [json_name = "_type"];
  HL7.v600.types.string name = 5;
  HL7.v600.types.Element shadow__name = 6 [json_name = "_name"];
  repeated HL7.v600.types.ContactDetail contact = 7;
}
