syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ClaimResponse_Adjudication.proto";
import "types/ClaimResponse_ReviewOutcome.proto";
import "types/positiveInt.proto";
import "types/string.proto";

message ClaimResponse_SubDetail {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.positiveInt subDetailSequence = 4;
  HL7.v600.types.Element shadow__subDetailSequence = 5 [json_name = "_subDetailSequence"];
  repeated HL7.v600.types.Identifier traceNumber = 6;
  repeated HL7.v600.types.positiveInt noteNumber = 7;
  repeated HL7.v600.types.Element shadow__noteNumber = 8 [json_name = "_noteNumber"];
  HL7.v600.types.ClaimResponse_ReviewOutcome reviewOutcome = 9;
  repeated HL7.v600.types.ClaimResponse_Adjudication adjudication = 10;
}
