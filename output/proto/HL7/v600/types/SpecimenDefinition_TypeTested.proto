syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/SpecimenDefinition_Container.proto";
import "types/SpecimenDefinition_Handling.proto";
import "types/boolean.proto";
import "types/code.proto";
import "types/markdown.proto";
import "types/string.proto";

message SpecimenDefinition_TypeTested {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.boolean isDerived = 4;
  HL7.v600.types.Element shadow__isDerived = 5 [json_name = "_isDerived"];
  HL7.v600.types.CodeableConcept type = 6;
  HL7.v600.types.code preference = 7;
  HL7.v600.types.Element shadow__preference = 8 [json_name = "_preference"];
  HL7.v600.types.SpecimenDefinition_Container container = 9;
  HL7.v600.types.markdown requirement = 10;
  HL7.v600.types.Element shadow__requirement = 11 [json_name = "_requirement"];
  HL7.v600.types.Duration retentionTime = 12;
  HL7.v600.types.boolean singleUse = 13;
  HL7.v600.types.Element shadow__singleUse = 14 [json_name = "_singleUse"];
  repeated HL7.v600.types.CodeableConcept rejectionCriterion = 15;
  repeated HL7.v600.types.SpecimenDefinition_Handling handling = 16;
  repeated HL7.v600.types.CodeableConcept testingDestination = 17;
}
