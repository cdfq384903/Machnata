syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/code.proto";
import "types/string.proto";
import "types/uri.proto";

message TestReport_Participant {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.code type = 4;
  HL7.v600.types.Element shadow__type = 5 [json_name = "_type"];
  HL7.v600.types.uri uri = 6;
  HL7.v600.types.Element shadow__uri = 7 [json_name = "_uri"];
  HL7.v600.types.uri version = 8;
  HL7.v600.types.Element shadow__version = 9 [json_name = "_version"];
  HL7.v600.types.string display = 10;
  HL7.v600.types.Element shadow__display = 11 [json_name = "_display"];
}
