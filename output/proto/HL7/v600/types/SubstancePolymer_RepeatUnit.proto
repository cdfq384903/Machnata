syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/SubstancePolymer_DegreeOfPolymerisation.proto";
import "types/SubstancePolymer_StructuralRepresentation.proto";
import "types/integer.proto";
import "types/string.proto";

message SubstancePolymer_RepeatUnit {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string unit = 4;
  HL7.v600.types.Element shadow__unit = 5 [json_name = "_unit"];
  HL7.v600.types.CodeableConcept orientation = 6;
  HL7.v600.types.integer amount = 7;
  HL7.v600.types.Element shadow__amount = 8 [json_name = "_amount"];
  repeated HL7.v600.types.SubstancePolymer_DegreeOfPolymerisation degreeOfPolymerisation = 9;
  repeated HL7.v600.types.SubstancePolymer_StructuralRepresentation structuralRepresentation = 10;
}
