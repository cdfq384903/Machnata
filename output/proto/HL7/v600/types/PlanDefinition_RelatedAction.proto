syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/code.proto";
import "types/string.proto";

message PlanDefinition_RelatedAction {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string targetId = 4;
  HL7.v600.types.Element shadow__targetId = 5 [json_name = "_targetId"];
  HL7.v600.types.code relationship = 6;
  HL7.v600.types.Element shadow__relationship = 7 [json_name = "_relationship"];
  HL7.v600.types.code endRelationship = 8;
  HL7.v600.types.Element shadow__endRelationship = 9 [json_name = "_endRelationship"];
  HL7.v600.types.Duration offsetDuration = 10;
  HL7.v600.types.Range offsetRange = 11;
}
