syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/CoverageEligibilityRequest_Diagnosis.proto";
import "types/positiveInt.proto";
import "types/string.proto";

message CoverageEligibilityRequest_Item {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.positiveInt supportingInfoSequence = 4;
  repeated HL7.v600.types.Element shadow__supportingInfoSequence = 5 [json_name = "_supportingInfoSequence"];
  HL7.v600.types.CodeableConcept category = 6;
  HL7.v600.types.CodeableConcept productOrService = 7;
  repeated HL7.v600.types.CodeableConcept modifier = 8;
  HL7.v600.types.Reference provider = 9;
  HL7.v600.types.Quantity quantity = 10;
  HL7.v600.types.Money unitPrice = 11;
  HL7.v600.types.Reference facility = 12;
  repeated HL7.v600.types.CoverageEligibilityRequest_Diagnosis diagnosis = 13;
  repeated HL7.v600.types.Reference detail = 14;
}
