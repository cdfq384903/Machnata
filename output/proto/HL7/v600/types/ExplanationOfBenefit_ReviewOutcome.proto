syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message ExplanationOfBenefit_ReviewOutcome {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept decision = 4;
  repeated HL7.v600.types.CodeableConcept reason = 5;
  HL7.v600.types.string preAuthRef = 6;
  HL7.v600.types.Element shadow__preAuthRef = 7 [json_name = "_preAuthRef"];
  HL7.v600.types.Period preAuthPeriod = 8;
}
