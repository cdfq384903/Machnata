syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/positiveInt.proto";
import "types/string.proto";

message Appointment_MonthlyTemplate {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.positiveInt dayOfMonth = 4;
  HL7.v600.types.Element shadow__dayOfMonth = 5 [json_name = "_dayOfMonth"];
  HL7.v600.types.Coding nthWeekOfMonth = 6;
  HL7.v600.types.Coding dayOfWeek = 7;
  HL7.v600.types.positiveInt monthInterval = 8;
  HL7.v600.types.Element shadow__monthInterval = 9 [json_name = "_monthInterval"];
}
