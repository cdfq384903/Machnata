syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ChargeItemDefinition_Applicability.proto";
import "types/MonetaryComponent.proto";
import "types/string.proto";

message ChargeItemDefinition_PropertyGroup {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.ChargeItemDefinition_Applicability applicability = 4;
  repeated HL7.v600.types.MonetaryComponent priceComponent = 5;
}
