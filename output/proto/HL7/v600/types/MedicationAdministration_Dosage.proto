syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message MedicationAdministration_Dosage {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string text = 4;
  HL7.v600.types.Element shadow__text = 5 [json_name = "_text"];
  HL7.v600.types.CodeableConcept site = 6;
  HL7.v600.types.CodeableConcept route = 7;
  HL7.v600.types.CodeableConcept method = 8;
  HL7.v600.types.Quantity dose = 9;
  HL7.v600.types.Ratio rateRatio = 10;
  HL7.v600.types.Quantity rateQuantity = 11;
}
