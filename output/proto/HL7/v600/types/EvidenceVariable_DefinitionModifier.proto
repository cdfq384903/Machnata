syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/RelativeTime.proto";
import "types/string.proto";

message EvidenceVariable_DefinitionModifier {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept code = 4;
  HL7.v600.types.CodeableConcept valueCodeableConcept = 5;
  bool valueBoolean = 6;
  HL7.v600.types.Element shadow__valueBoolean = 7 [json_name = "_valueBoolean"];
  HL7.v600.types.Quantity valueQuantity = 8;
  HL7.v600.types.Range valueRange = 9;
  HL7.v600.types.Period valuePeriod = 10;
  HL7.v600.types.RelativeTime valueRelativeTime = 11;
  HL7.v600.types.Reference valueReference = 12;
  HL7.v600.types.Expression valueExpression = 13;
  string valueUri = 14;
  HL7.v600.types.Element shadow__valueUri = 15 [json_name = "_valueUri"];
}
