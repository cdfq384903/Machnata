syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message AuditEvent_Detail {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept type = 4;
  HL7.v600.types.Quantity valueQuantity = 5;
  HL7.v600.types.CodeableConcept valueCodeableConcept = 6;
  string valueString = 7;
  HL7.v600.types.Element shadow__valueString = 8 [json_name = "_valueString"];
  bool valueBoolean = 9;
  HL7.v600.types.Element shadow__valueBoolean = 10 [json_name = "_valueBoolean"];
  double valueInteger = 11;
  HL7.v600.types.Element shadow__valueInteger = 12 [json_name = "_valueInteger"];
  HL7.v600.types.Range valueRange = 13;
  HL7.v600.types.Ratio valueRatio = 14;
  string valueTime = 15;
  HL7.v600.types.Element shadow__valueTime = 16 [json_name = "_valueTime"];
  string valueDateTime = 17;
  HL7.v600.types.Element shadow__valueDateTime = 18 [json_name = "_valueDateTime"];
  HL7.v600.types.Period valuePeriod = 19;
  string valueBase64Binary = 20;
  HL7.v600.types.Element shadow__valueBase64Binary = 21 [json_name = "_valueBase64Binary"];
}
