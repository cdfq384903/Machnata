syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/RelativeTime.proto";
import "types/boolean.proto";
import "types/markdown.proto";
import "types/string.proto";

message Group_Characteristic {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept code = 4;
  HL7.v600.types.CodeableConcept valueCodeableConcept = 5;
  bool valueBoolean = 6;
  HL7.v600.types.Element shadow__valueBoolean = 7 [json_name = "_valueBoolean"];
  HL7.v600.types.Quantity valueQuantity = 8;
  HL7.v600.types.Range valueRange = 9;
  HL7.v600.types.Reference valueReference = 10;
  string valueUri = 11;
  HL7.v600.types.Element shadow__valueUri = 12 [json_name = "_valueUri"];
  HL7.v600.types.Expression valueExpression = 13;
  HL7.v600.types.boolean exclude = 14;
  HL7.v600.types.Element shadow__exclude = 15 [json_name = "_exclude"];
  HL7.v600.types.markdown description = 16;
  HL7.v600.types.Element shadow__description = 17 [json_name = "_description"];
  repeated HL7.v600.types.CodeableConcept method = 18;
  HL7.v600.types.Reference determinedByReference = 19;
  HL7.v600.types.Expression determinedByExpression = 20;
  HL7.v600.types.CodeableConcept offset = 21;
  double instancesUnsignedInt = 22;
  HL7.v600.types.Element shadow__instancesUnsignedInt = 23 [json_name = "_instancesUnsignedInt"];
  HL7.v600.types.Range instancesRange = 24;
  HL7.v600.types.Duration durationDuration = 25;
  HL7.v600.types.Range durationRange = 26;
  HL7.v600.types.Period period = 27;
  repeated HL7.v600.types.RelativeTime timing = 28;
}
