syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/id.proto";
import "types/string.proto";

message TestScript_Variable {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string name = 4;
  HL7.v600.types.Element shadow__name = 5 [json_name = "_name"];
  HL7.v600.types.string defaultValue = 6;
  HL7.v600.types.Element shadow__defaultValue = 7 [json_name = "_defaultValue"];
  HL7.v600.types.string description = 8;
  HL7.v600.types.Element shadow__description = 9 [json_name = "_description"];
  HL7.v600.types.string expression = 10;
  HL7.v600.types.Element shadow__expression = 11 [json_name = "_expression"];
  HL7.v600.types.string headerField = 12;
  HL7.v600.types.Element shadow__headerField = 13 [json_name = "_headerField"];
  HL7.v600.types.string hint = 14;
  HL7.v600.types.Element shadow__hint = 15 [json_name = "_hint"];
  HL7.v600.types.string path = 16;
  HL7.v600.types.Element shadow__path = 17 [json_name = "_path"];
  HL7.v600.types.id sourceId = 18;
  HL7.v600.types.Element shadow__sourceId = 19 [json_name = "_sourceId"];
}
