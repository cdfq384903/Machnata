syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/canonical.proto";
import "types/code.proto";
import "types/string.proto";

message ConceptMap_DependsOn {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.code attribute = 4;
  HL7.v600.types.Element shadow__attribute = 5 [json_name = "_attribute"];
  string valueCode = 6;
  HL7.v600.types.Element shadow__valueCode = 7 [json_name = "_valueCode"];
  HL7.v600.types.Coding valueCoding = 8;
  string valueString = 9;
  HL7.v600.types.Element shadow__valueString = 10 [json_name = "_valueString"];
  bool valueBoolean = 11;
  HL7.v600.types.Element shadow__valueBoolean = 12 [json_name = "_valueBoolean"];
  HL7.v600.types.Quantity valueQuantity = 13;
  HL7.v600.types.canonical valueSet = 14;
}
