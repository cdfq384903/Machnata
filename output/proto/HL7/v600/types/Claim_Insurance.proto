syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/boolean.proto";
import "types/positiveInt.proto";
import "types/string.proto";

message Claim_Insurance {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.positiveInt sequence = 4;
  HL7.v600.types.Element shadow__sequence = 5 [json_name = "_sequence"];
  HL7.v600.types.boolean focal = 6;
  HL7.v600.types.Element shadow__focal = 7 [json_name = "_focal"];
  HL7.v600.types.Identifier identifier = 8;
  HL7.v600.types.Reference coverage = 9;
  HL7.v600.types.string businessArrangement = 10;
  HL7.v600.types.Element shadow__businessArrangement = 11 [json_name = "_businessArrangement"];
  repeated HL7.v600.types.string preAuthRef = 12;
  repeated HL7.v600.types.Element shadow__preAuthRef = 13 [json_name = "_preAuthRef"];
  HL7.v600.types.Reference claimResponse = 14;
}
