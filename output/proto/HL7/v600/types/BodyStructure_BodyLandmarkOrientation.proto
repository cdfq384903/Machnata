syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/BodyStructure_DistanceFromLandmark.proto";
import "types/string.proto";

message BodyStructure_BodyLandmarkOrientation {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.CodeableConcept landmarkDescription = 4;
  repeated HL7.v600.types.CodeableConcept clockFacePosition = 5;
  repeated HL7.v600.types.BodyStructure_DistanceFromLandmark distanceFromLandmark = 6;
  repeated HL7.v600.types.CodeableConcept surfaceOrientation = 7;
}
