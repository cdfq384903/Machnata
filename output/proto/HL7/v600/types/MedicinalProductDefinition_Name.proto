syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/MedicinalProductDefinition_Part.proto";
import "types/MedicinalProductDefinition_Usage.proto";
import "types/string.proto";

message MedicinalProductDefinition_Name {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string productName = 4;
  HL7.v600.types.Element shadow__productName = 5 [json_name = "_productName"];
  HL7.v600.types.CodeableConcept type = 6;
  repeated HL7.v600.types.MedicinalProductDefinition_Part part = 7;
  repeated HL7.v600.types.MedicinalProductDefinition_Usage usage = 8;
}
