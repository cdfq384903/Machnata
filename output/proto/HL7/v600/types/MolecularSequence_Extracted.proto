syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/boolean.proto";
import "types/integer.proto";
import "types/string.proto";

message MolecularSequence_Extracted {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Reference startingSequence = 4;
  HL7.v600.types.integer start = 5;
  HL7.v600.types.Element shadow__start = 6 [json_name = "_start"];
  HL7.v600.types.integer end = 7;
  HL7.v600.types.Element shadow__end = 8 [json_name = "_end"];
  HL7.v600.types.CodeableConcept coordinateSystem = 9;
  HL7.v600.types.boolean reverseComplement = 10;
  HL7.v600.types.Element shadow__reverseComplement = 11 [json_name = "_reverseComplement"];
}
