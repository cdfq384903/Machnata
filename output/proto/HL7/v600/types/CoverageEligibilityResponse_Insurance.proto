syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/CoverageEligibilityResponse_Item.proto";
import "types/boolean.proto";
import "types/string.proto";

message CoverageEligibilityResponse_Insurance {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Reference coverage = 4;
  HL7.v600.types.boolean inforce = 5;
  HL7.v600.types.Element shadow__inforce = 6 [json_name = "_inforce"];
  HL7.v600.types.Period benefitPeriod = 7;
  repeated HL7.v600.types.CoverageEligibilityResponse_Item item = 8;
}
