syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/DeviceDefinition_Distributor.proto";
import "types/DeviceDefinition_UdiDeviceIdentifier.proto";
import "types/integer.proto";
import "types/string.proto";

message DeviceDefinition_Packaging {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Identifier identifier = 4;
  HL7.v600.types.CodeableConcept type = 5;
  HL7.v600.types.integer count = 6;
  HL7.v600.types.Element shadow__count = 7 [json_name = "_count"];
  repeated HL7.v600.types.DeviceDefinition_Distributor distributor = 8;
  repeated HL7.v600.types.DeviceDefinition_UdiDeviceIdentifier udiDeviceIdentifier = 9;
  repeated HL7.v600.types.DeviceDefinition_Packaging packaging = 10;
}
