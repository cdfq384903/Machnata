syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/MedicationKnowledge_EnvironmentalSetting.proto";
import "types/string.proto";
import "types/uri.proto";

message MedicationKnowledge_StorageGuideline {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.uri reference = 4;
  HL7.v600.types.Element shadow__reference = 5 [json_name = "_reference"];
  repeated HL7.v600.types.Annotation note = 6;
  HL7.v600.types.Duration stabilityDuration = 7;
  repeated HL7.v600.types.MedicationKnowledge_EnvironmentalSetting environmentalSetting = 8;
}
