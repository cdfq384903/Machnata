syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/CapabilityStatement_Interaction1.proto";
import "types/CapabilityStatement_Operation.proto";
import "types/CapabilityStatement_Resource.proto";
import "types/CapabilityStatement_SearchParam.proto";
import "types/CapabilityStatement_Security.proto";
import "types/canonical.proto";
import "types/code.proto";
import "types/markdown.proto";
import "types/string.proto";

message CapabilityStatement_Rest {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.code mode = 4;
  HL7.v600.types.Element shadow__mode = 5 [json_name = "_mode"];
  HL7.v600.types.markdown documentation = 6;
  HL7.v600.types.Element shadow__documentation = 7 [json_name = "_documentation"];
  HL7.v600.types.CapabilityStatement_Security security = 8;
  repeated HL7.v600.types.CapabilityStatement_Resource resource = 9;
  repeated HL7.v600.types.CapabilityStatement_Interaction1 interaction = 10;
  repeated HL7.v600.types.CapabilityStatement_SearchParam searchParam = 11;
  repeated HL7.v600.types.CapabilityStatement_Operation operation = 12;
  repeated HL7.v600.types.canonical compartment = 13;
}
