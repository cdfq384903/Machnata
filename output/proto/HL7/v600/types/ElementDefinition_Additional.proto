syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/boolean.proto";
import "types/canonical.proto";
import "types/code.proto";
import "types/id.proto";
import "types/markdown.proto";
import "types/string.proto";

message ElementDefinition_Additional {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.id key = 4;
  HL7.v600.types.Element shadow__key = 5 [json_name = "_key"];
  HL7.v600.types.code purpose = 6;
  HL7.v600.types.Element shadow__purpose = 7 [json_name = "_purpose"];
  HL7.v600.types.canonical valueSet = 8;
  HL7.v600.types.markdown documentation = 9;
  HL7.v600.types.Element shadow__documentation = 10 [json_name = "_documentation"];
  HL7.v600.types.string shortDoco = 11;
  HL7.v600.types.Element shadow__shortDoco = 12 [json_name = "_shortDoco"];
  repeated HL7.v600.types.UsageContext usage = 13;
  HL7.v600.types.boolean any = 14;
  HL7.v600.types.Element shadow__any = 15 [json_name = "_any"];
}
