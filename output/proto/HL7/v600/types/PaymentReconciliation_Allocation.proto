syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/date.proto";
import "types/string.proto";

message PaymentReconciliation_Allocation {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Identifier identifier = 4;
  HL7.v600.types.Identifier predecessor = 5;
  HL7.v600.types.Reference target = 6;
  string targetItemString = 7;
  HL7.v600.types.Element shadow__targetItemString = 8 [json_name = "_targetItemString"];
  HL7.v600.types.Identifier targetItemIdentifier = 9;
  double targetItemPositiveInt = 10;
  HL7.v600.types.Element shadow__targetItemPositiveInt = 11 [json_name = "_targetItemPositiveInt"];
  HL7.v600.types.Reference encounter = 12;
  HL7.v600.types.Reference account = 13;
  HL7.v600.types.CodeableConcept type = 14;
  HL7.v600.types.Reference submitter = 15;
  HL7.v600.types.Reference response = 16;
  HL7.v600.types.date date = 17;
  HL7.v600.types.Element shadow__date = 18 [json_name = "_date"];
  HL7.v600.types.Reference responsible = 19;
  HL7.v600.types.Reference payee = 20;
  HL7.v600.types.Money amount = 21;
}
