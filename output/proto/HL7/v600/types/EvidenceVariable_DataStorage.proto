syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message EvidenceVariable_DataStorage {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept datatype = 4;
  HL7.v600.types.string path = 5;
  HL7.v600.types.Element shadow__path = 6 [json_name = "_path"];
  HL7.v600.types.string delimiter = 7;
  HL7.v600.types.Element shadow__delimiter = 8 [json_name = "_delimiter"];
  repeated HL7.v600.types.EvidenceVariable_DataStorage component = 9;
}
