syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/StructureMap_Dependent.proto";
import "types/StructureMap_Source.proto";
import "types/StructureMap_Target.proto";
import "types/id.proto";
import "types/string.proto";

message StructureMap_Rule {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.id name = 4;
  HL7.v600.types.Element shadow__name = 5 [json_name = "_name"];
  repeated HL7.v600.types.StructureMap_Source source = 6;
  repeated HL7.v600.types.StructureMap_Target target = 7;
  repeated HL7.v600.types.StructureMap_Rule rule = 8;
  repeated HL7.v600.types.StructureMap_Dependent dependent = 9;
  HL7.v600.types.string documentation = 10;
  HL7.v600.types.Element shadow__documentation = 11 [json_name = "_documentation"];
}
