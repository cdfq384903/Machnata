syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/MedicationKnowledge_DrugCharacteristic.proto";
import "types/MedicationKnowledge_Ingredient.proto";
import "types/string.proto";

message MedicationKnowledge_Definitional {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.Reference definition = 4;
  HL7.v600.types.CodeableConcept doseForm = 5;
  repeated HL7.v600.types.CodeableConcept intendedRoute = 6;
  repeated HL7.v600.types.MedicationKnowledge_Ingredient ingredient = 7;
  repeated HL7.v600.types.MedicationKnowledge_DrugCharacteristic drugCharacteristic = 8;
}
