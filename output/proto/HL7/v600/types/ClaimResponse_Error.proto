syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/positiveInt.proto";
import "types/string.proto";

message ClaimResponse_Error {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.positiveInt itemSequence = 4;
  HL7.v600.types.Element shadow__itemSequence = 5 [json_name = "_itemSequence"];
  HL7.v600.types.positiveInt detailSequence = 6;
  HL7.v600.types.Element shadow__detailSequence = 7 [json_name = "_detailSequence"];
  HL7.v600.types.positiveInt subDetailSequence = 8;
  HL7.v600.types.Element shadow__subDetailSequence = 9 [json_name = "_subDetailSequence"];
  HL7.v600.types.CodeableConcept code = 10;
  repeated HL7.v600.types.string expression = 11;
  repeated HL7.v600.types.Element shadow__expression = 12 [json_name = "_expression"];
}
