syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/Citation_Entry.proto";
import "types/Citation_Summary1.proto";
import "types/boolean.proto";
import "types/string.proto";

message Citation_Contributorship {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.boolean complete = 4;
  HL7.v600.types.Element shadow__complete = 5 [json_name = "_complete"];
  repeated HL7.v600.types.Citation_Entry entry = 6;
  repeated HL7.v600.types.Citation_Summary1 summary = 7;
}
