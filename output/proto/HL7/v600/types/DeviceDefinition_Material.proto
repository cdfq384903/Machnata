syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/boolean.proto";
import "types/string.proto";

message DeviceDefinition_Material {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept substance = 4;
  HL7.v600.types.boolean alternate = 5;
  HL7.v600.types.Element shadow__alternate = 6 [json_name = "_alternate"];
  HL7.v600.types.boolean allergenicIndicator = 7;
  HL7.v600.types.Element shadow__allergenicIndicator = 8 [json_name = "_allergenicIndicator"];
}
