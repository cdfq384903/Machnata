syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ValueSet_Designation.proto";
import "types/ValueSet_Property1.proto";
import "types/boolean.proto";
import "types/code.proto";
import "types/string.proto";
import "types/uri.proto";

message ValueSet_Contains {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.uri system = 4;
  HL7.v600.types.Element shadow__system = 5 [json_name = "_system"];
  HL7.v600.types.boolean abstract = 6;
  HL7.v600.types.Element shadow__abstract = 7 [json_name = "_abstract"];
  HL7.v600.types.boolean inactive = 8;
  HL7.v600.types.Element shadow__inactive = 9 [json_name = "_inactive"];
  HL7.v600.types.string version = 10;
  HL7.v600.types.Element shadow__version = 11 [json_name = "_version"];
  HL7.v600.types.code code = 12;
  HL7.v600.types.Element shadow__code = 13 [json_name = "_code"];
  HL7.v600.types.string display = 14;
  HL7.v600.types.Element shadow__display = 15 [json_name = "_display"];
  repeated HL7.v600.types.ValueSet_Designation designation = 16;
  repeated HL7.v600.types.ValueSet_Property1 property = 17;
  repeated HL7.v600.types.ValueSet_Contains contains = 18;
}
