syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/SubscriptionStatus_RelatedQuery.proto";
import "types/instant.proto";
import "types/integer64.proto";
import "types/string.proto";

message SubscriptionStatus_NotificationEvent {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.integer64 eventNumber = 4;
  HL7.v600.types.Element shadow__eventNumber = 5 [json_name = "_eventNumber"];
  repeated HL7.v600.types.CodeableConcept triggerEvent = 6;
  HL7.v600.types.instant timestamp = 7;
  HL7.v600.types.Element shadow__timestamp = 8 [json_name = "_timestamp"];
  HL7.v600.types.Reference focus = 9;
  repeated HL7.v600.types.Reference additionalContext = 10;
  repeated HL7.v600.types.SubscriptionStatus_RelatedQuery relatedQuery = 11;
}
