syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/SubstanceDefinition_Official.proto";
import "types/boolean.proto";
import "types/string.proto";

message SubstanceDefinition_Name {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string name = 4;
  HL7.v600.types.Element shadow__name = 5 [json_name = "_name"];
  HL7.v600.types.CodeableConcept type = 6;
  HL7.v600.types.CodeableConcept status = 7;
  HL7.v600.types.boolean preferred = 8;
  HL7.v600.types.Element shadow__preferred = 9 [json_name = "_preferred"];
  repeated HL7.v600.types.CodeableConcept language = 10;
  repeated HL7.v600.types.CodeableConcept domain = 11;
  repeated HL7.v600.types.CodeableConcept jurisdiction = 12;
  repeated HL7.v600.types.SubstanceDefinition_Name synonym = 13;
  repeated HL7.v600.types.SubstanceDefinition_Name translation = 14;
  repeated HL7.v600.types.SubstanceDefinition_Official official = 15;
  repeated HL7.v600.types.Reference source = 16;
}
