syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/date.proto";
import "types/string.proto";

message VerificationResult_Attestation {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Reference who = 4;
  HL7.v600.types.Reference onBehalfOf = 5;
  HL7.v600.types.CodeableConcept communicationMethod = 6;
  HL7.v600.types.date date = 7;
  HL7.v600.types.Element shadow__date = 8 [json_name = "_date"];
  HL7.v600.types.string sourceIdentityCertificate = 9;
  HL7.v600.types.Element shadow__sourceIdentityCertificate = 10 [json_name = "_sourceIdentityCertificate"];
  HL7.v600.types.string proxyIdentityCertificate = 11;
  HL7.v600.types.Element shadow__proxyIdentityCertificate = 12 [json_name = "_proxyIdentityCertificate"];
  HL7.v600.types.Signature proxySignature = 13;
  HL7.v600.types.Signature sourceSignature = 14;
}
