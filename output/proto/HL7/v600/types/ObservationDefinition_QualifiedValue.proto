syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/canonical.proto";
import "types/code.proto";
import "types/string.proto";

message ObservationDefinition_QualifiedValue {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept context = 4;
  repeated HL7.v600.types.CodeableConcept appliesTo = 5;
  HL7.v600.types.code gender = 6;
  HL7.v600.types.Element shadow__gender = 7 [json_name = "_gender"];
  HL7.v600.types.Range age = 8;
  HL7.v600.types.Range gestationalAge = 9;
  HL7.v600.types.string condition = 10;
  HL7.v600.types.Element shadow__condition = 11 [json_name = "_condition"];
  HL7.v600.types.code rangeCategory = 12;
  HL7.v600.types.Element shadow__rangeCategory = 13 [json_name = "_rangeCategory"];
  HL7.v600.types.Range range = 14;
  HL7.v600.types.canonical validCodedValueSet = 15;
  HL7.v600.types.canonical normalCodedValueSet = 16;
  HL7.v600.types.canonical abnormalCodedValueSet = 17;
  HL7.v600.types.canonical criticalCodedValueSet = 18;
  repeated HL7.v600.types.CodeableConcept interpretation = 19;
}
