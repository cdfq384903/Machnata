syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ClinicalUseDefinition_Interactant.proto";
import "types/string.proto";

message ClinicalUseDefinition_Interaction {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.ClinicalUseDefinition_Interactant interactant = 4;
  HL7.v600.types.CodeableConcept type = 5;
  HL7.v600.types.CodeableReference effect = 6;
  HL7.v600.types.CodeableConcept incidence = 7;
  repeated HL7.v600.types.CodeableConcept management = 8;
}
