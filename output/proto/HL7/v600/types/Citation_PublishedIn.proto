syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message Citation_PublishedIn {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept type = 4;
  repeated HL7.v600.types.Identifier identifier = 5;
  HL7.v600.types.string title = 6;
  HL7.v600.types.Element shadow__title = 7 [json_name = "_title"];
  HL7.v600.types.Reference publisher = 8;
  HL7.v600.types.string publisherLocation = 9;
  HL7.v600.types.Element shadow__publisherLocation = 10 [json_name = "_publisherLocation"];
}
