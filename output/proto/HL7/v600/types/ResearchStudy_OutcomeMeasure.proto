syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ResearchStudy_EventHandling.proto";
import "types/markdown.proto";
import "types/string.proto";

message ResearchStudy_OutcomeMeasure {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string name = 4;
  HL7.v600.types.Element shadow__name = 5 [json_name = "_name"];
  HL7.v600.types.CodeableConcept type = 6;
  HL7.v600.types.markdown description = 7;
  HL7.v600.types.Element shadow__description = 8 [json_name = "_description"];
  HL7.v600.types.Reference endpoint = 9;
  HL7.v600.types.Reference population = 10;
  HL7.v600.types.Reference intervention = 11;
  HL7.v600.types.Reference comparator = 12;
  HL7.v600.types.CodeableConcept summaryMeasure = 13;
  repeated HL7.v600.types.ResearchStudy_EventHandling eventHandling = 14;
}
