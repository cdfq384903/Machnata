syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/boolean.proto";
import "types/code.proto";
import "types/string.proto";

message NamingSystem_UniqueId {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.code type = 4;
  HL7.v600.types.Element shadow__type = 5 [json_name = "_type"];
  HL7.v600.types.string value = 6;
  HL7.v600.types.Element shadow__value = 7 [json_name = "_value"];
  HL7.v600.types.boolean preferred = 8;
  HL7.v600.types.Element shadow__preferred = 9 [json_name = "_preferred"];
  HL7.v600.types.string comment = 10;
  HL7.v600.types.Element shadow__comment = 11 [json_name = "_comment"];
  HL7.v600.types.Period period = 12;
  HL7.v600.types.boolean authoritative = 13;
  HL7.v600.types.Element shadow__authoritative = 14 [json_name = "_authoritative"];
}
