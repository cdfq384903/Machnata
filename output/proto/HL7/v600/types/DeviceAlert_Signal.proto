syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/code.proto";
import "types/string.proto";

message DeviceAlert_Signal {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.code activationState = 4;
  HL7.v600.types.Element shadow__activationState = 5 [json_name = "_activationState"];
  HL7.v600.types.code presence = 6;
  HL7.v600.types.Element shadow__presence = 7 [json_name = "_presence"];
  HL7.v600.types.CodeableReference annunciator = 8;
  HL7.v600.types.CodeableConcept manifestation = 9;
  repeated HL7.v600.types.CodeableConcept type = 10;
  HL7.v600.types.Period indication = 11;
}
