syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/canonical.proto";
import "types/code.proto";
import "types/string.proto";

message PlanDefinition_Participant {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.string actorId = 4;
  HL7.v600.types.Element shadow__actorId = 5 [json_name = "_actorId"];
  HL7.v600.types.code type = 6;
  HL7.v600.types.Element shadow__type = 7 [json_name = "_type"];
  HL7.v600.types.canonical typeCanonical = 8;
  HL7.v600.types.Reference typeReference = 9;
  HL7.v600.types.CodeableConcept role = 10;
  HL7.v600.types.CodeableConcept function = 11;
}
