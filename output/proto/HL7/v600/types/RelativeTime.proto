syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/canonical.proto";
import "types/string.proto";

message RelativeTime {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Reference contextReference = 4;
  HL7.v600.types.canonical contextDefinition = 5;
  HL7.v600.types.string contextPath = 6;
  HL7.v600.types.Element shadow__contextPath = 7 [json_name = "_contextPath"];
  HL7.v600.types.CodeableConcept contextCode = 8;
  HL7.v600.types.Duration offsetDuration = 9;
  HL7.v600.types.Range offsetRange = 10;
  HL7.v600.types.string text = 11;
  HL7.v600.types.Element shadow__text = 12 [json_name = "_text"];
}
