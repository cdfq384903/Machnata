syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/positiveInt.proto";
import "types/string.proto";

message ExplanationOfBenefit_SupportingInfo {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.positiveInt sequence = 4;
  HL7.v600.types.Element shadow__sequence = 5 [json_name = "_sequence"];
  HL7.v600.types.CodeableConcept category = 6;
  HL7.v600.types.CodeableConcept code = 7;
  string timingDate = 8;
  HL7.v600.types.Element shadow__timingDate = 9 [json_name = "_timingDate"];
  HL7.v600.types.Period timingPeriod = 10;
  bool valueBoolean = 11;
  HL7.v600.types.Element shadow__valueBoolean = 12 [json_name = "_valueBoolean"];
  string valueString = 13;
  HL7.v600.types.Element shadow__valueString = 14 [json_name = "_valueString"];
  HL7.v600.types.Quantity valueQuantity = 15;
  HL7.v600.types.Attachment valueAttachment = 16;
  HL7.v600.types.Reference valueReference = 17;
  HL7.v600.types.Identifier valueIdentifier = 18;
  HL7.v600.types.Coding reason = 19;
}
