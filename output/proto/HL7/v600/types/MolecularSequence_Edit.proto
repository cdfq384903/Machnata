syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/integer.proto";
import "types/string.proto";

message MolecularSequence_Edit {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.integer editOrder = 4;
  HL7.v600.types.Element shadow__editOrder = 5 [json_name = "_editOrder"];
  HL7.v600.types.CodeableConcept coordinateSystem = 6;
  HL7.v600.types.integer start = 7;
  HL7.v600.types.Element shadow__start = 8 [json_name = "_start"];
  HL7.v600.types.integer end = 9;
  HL7.v600.types.Element shadow__end = 10 [json_name = "_end"];
  HL7.v600.types.Reference replacementSequence = 11;
  HL7.v600.types.Reference replacedSequence = 12;
}
