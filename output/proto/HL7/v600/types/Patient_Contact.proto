syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/code.proto";
import "types/string.proto";

message Patient_Contact {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  repeated HL7.v600.types.CodeableConcept relationship = 4;
  repeated HL7.v600.types.CodeableConcept role = 5;
  HL7.v600.types.HumanName name = 6;
  repeated HL7.v600.types.HumanName additionalName = 7;
  repeated HL7.v600.types.ContactPoint telecom = 8;
  HL7.v600.types.Address address = 9;
  repeated HL7.v600.types.Address additionalAddress = 10;
  HL7.v600.types.code gender = 11;
  HL7.v600.types.Element shadow__gender = 12 [json_name = "_gender"];
  HL7.v600.types.Reference organization = 13;
  HL7.v600.types.Period period = 14;
}
