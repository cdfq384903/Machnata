syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/InventoryReport_Item.proto";
import "types/dateTime.proto";
import "types/string.proto";

message InventoryReport_InventoryListing {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Reference location = 4;
  HL7.v600.types.CodeableConcept itemStatus = 5;
  HL7.v600.types.dateTime countingDateTime = 6;
  HL7.v600.types.Element shadow__countingDateTime = 7 [json_name = "_countingDateTime"];
  repeated HL7.v600.types.InventoryReport_Item item = 8;
}
