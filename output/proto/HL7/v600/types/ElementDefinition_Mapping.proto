syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/code.proto";
import "types/id.proto";
import "types/markdown.proto";
import "types/string.proto";

message ElementDefinition_Mapping {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.id identity = 4;
  HL7.v600.types.Element shadow__identity = 5 [json_name = "_identity"];
  HL7.v600.types.code language = 6;
  HL7.v600.types.Element shadow__language = 7 [json_name = "_language"];
  HL7.v600.types.string map = 8;
  HL7.v600.types.Element shadow__map = 9 [json_name = "_map"];
  HL7.v600.types.markdown comment = 10;
  HL7.v600.types.Element shadow__comment = 11 [json_name = "_comment"];
}
