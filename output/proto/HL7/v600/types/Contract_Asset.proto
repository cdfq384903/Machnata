syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/Contract_Answer.proto";
import "types/Contract_Context.proto";
import "types/Contract_ValuedItem.proto";
import "types/string.proto";
import "types/unsignedInt.proto";

message Contract_Asset {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept scope = 4;
  repeated HL7.v600.types.CodeableConcept type = 5;
  repeated HL7.v600.types.Reference typeReference = 6;
  repeated HL7.v600.types.CodeableConcept subtype = 7;
  HL7.v600.types.Coding relationship = 8;
  repeated HL7.v600.types.Contract_Context context = 9;
  HL7.v600.types.string condition = 10;
  HL7.v600.types.Element shadow__condition = 11 [json_name = "_condition"];
  repeated HL7.v600.types.CodeableConcept periodType = 12;
  repeated HL7.v600.types.Period period = 13;
  repeated HL7.v600.types.Period usePeriod = 14;
  HL7.v600.types.string text = 15;
  HL7.v600.types.Element shadow__text = 16 [json_name = "_text"];
  repeated HL7.v600.types.string linkId = 17;
  repeated HL7.v600.types.Element shadow__linkId = 18 [json_name = "_linkId"];
  repeated HL7.v600.types.Contract_Answer answer = 19;
  repeated HL7.v600.types.unsignedInt securityLabelNumber = 20;
  repeated HL7.v600.types.Element shadow__securityLabelNumber = 21 [json_name = "_securityLabelNumber"];
  repeated HL7.v600.types.Contract_ValuedItem valuedItem = 22;
}
