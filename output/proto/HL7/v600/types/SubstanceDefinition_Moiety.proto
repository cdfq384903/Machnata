syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message SubstanceDefinition_Moiety {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept role = 4;
  HL7.v600.types.Identifier identifier = 5;
  HL7.v600.types.string name = 6;
  HL7.v600.types.Element shadow__name = 7 [json_name = "_name"];
  HL7.v600.types.CodeableConcept stereochemistry = 8;
  HL7.v600.types.CodeableConcept opticalActivity = 9;
  HL7.v600.types.string molecularFormula = 10;
  HL7.v600.types.Element shadow__molecularFormula = 11 [json_name = "_molecularFormula"];
  HL7.v600.types.Quantity amountQuantity = 12;
  string amountString = 13;
  HL7.v600.types.Element shadow__amountString = 14 [json_name = "_amountString"];
  HL7.v600.types.CodeableConcept measurementType = 15;
}
