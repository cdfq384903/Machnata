syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message AdministrableProductDefinition_Property {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept type = 4;
  HL7.v600.types.CodeableConcept valueCodeableConcept = 5;
  HL7.v600.types.Quantity valueQuantity = 6;
  string valueDate = 7;
  HL7.v600.types.Element shadow__valueDate = 8 [json_name = "_valueDate"];
  bool valueBoolean = 9;
  HL7.v600.types.Element shadow__valueBoolean = 10 [json_name = "_valueBoolean"];
  string valueMarkdown = 11;
  HL7.v600.types.Element shadow__valueMarkdown = 12 [json_name = "_valueMarkdown"];
  HL7.v600.types.Attachment valueAttachment = 13;
  HL7.v600.types.Reference valueReference = 14;
  HL7.v600.types.CodeableConcept status = 15;
}
