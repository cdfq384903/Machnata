syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message ServiceRequest_Parameter {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept code = 4;
  HL7.v600.types.Quantity valueQuantity = 5;
  HL7.v600.types.Ratio valueRatio = 6;
  HL7.v600.types.Range valueRange = 7;
  bool valueBoolean = 8;
  HL7.v600.types.Element shadow__valueBoolean = 9 [json_name = "_valueBoolean"];
  HL7.v600.types.CodeableConcept valueCodeableConcept = 10;
  string valueString = 11;
  HL7.v600.types.Element shadow__valueString = 12 [json_name = "_valueString"];
  HL7.v600.types.Period valuePeriod = 13;
}
