syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/string.proto";

message MedicinalProductDefinition_Characteristic {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept type = 4;
  HL7.v600.types.CodeableConcept valueCodeableConcept = 5;
  string valueMarkdown = 6;
  HL7.v600.types.Element shadow__valueMarkdown = 7 [json_name = "_valueMarkdown"];
  HL7.v600.types.Quantity valueQuantity = 8;
  double valueInteger = 9;
  HL7.v600.types.Element shadow__valueInteger = 10 [json_name = "_valueInteger"];
  string valueDate = 11;
  HL7.v600.types.Element shadow__valueDate = 12 [json_name = "_valueDate"];
  bool valueBoolean = 13;
  HL7.v600.types.Element shadow__valueBoolean = 14 [json_name = "_valueBoolean"];
  HL7.v600.types.Attachment valueAttachment = 15;
}
