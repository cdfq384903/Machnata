syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/MolecularDefinition_CoordinateInterval1.proto";
import "types/boolean.proto";
import "types/string.proto";

message MolecularDefinition_Extracted {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.Reference startingMolecule = 4;
  HL7.v600.types.MolecularDefinition_CoordinateInterval1 coordinateInterval = 5;
  HL7.v600.types.boolean reverseComplement = 6;
  HL7.v600.types.Element shadow__reverseComplement = 7 [json_name = "_reverseComplement"];
}
