syntax = "proto3";
package HL7.v600.types;
option go_package = "tmp/v600/types;types";
option csharp_namespace = "HL7.v600.types";

import "types/Address.proto";
import "types/ObservationDefinition_QualifiedValue.proto";
import "types/code.proto";
import "types/string.proto";

message ObservationDefinition_Component {
  HL7.v600.types.string id = 1;
  repeated HL7.v600.types.Extension extension = 2;
  repeated HL7.v600.types.Extension modifierExtension = 3;
  HL7.v600.types.CodeableConcept code = 4;
  repeated HL7.v600.types.code permittedDataType = 5;
  repeated HL7.v600.types.Element shadow__permittedDataType = 6 [json_name = "_permittedDataType"];
  repeated HL7.v600.types.Coding permittedUnit = 7;
  repeated HL7.v600.types.ObservationDefinition_QualifiedValue qualifiedValue = 8;
}
