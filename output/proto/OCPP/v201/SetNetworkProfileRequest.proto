syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/CustomDataType.proto";
import "types/NetworkConnectionProfileType.proto";

message SetNetworkProfileRequest {
  OCPP.v201.types.CustomDataType customData = 1;
  // NOTE: This field is required by standard Spec.
  int32 configurationSlot = 2;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.NetworkConnectionProfileType connectionData = 3;
}