syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/CustomDataType.proto";
import "types/ReportDataType.proto";

message NotifyReportRequest {
  OCPP.v201.types.CustomDataType customData = 1;
  // NOTE: This field is required by standard Spec.
  int32 requestId = 2;
  // NOTE: This field is required by standard Spec.
  string generatedAt = 3;
  repeated OCPP.v201.types.ReportDataType reportData = 4;
  bool tbc = 5;
  // NOTE: This field is required by standard Spec.
  int32 seqNo = 6;
}