syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/ChargingProfileCriterionType.proto";
import "types/CustomDataType.proto";

message GetChargingProfilesRequest {
  OCPP.v201.types.CustomDataType customData = 1;
  // NOTE: This field is required by standard Spec.
  int32 requestId = 2;
  int32 evseId = 3;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.ChargingProfileCriterionType chargingProfile = 4;
}