syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/AuthorizationData.proto";
import "types/CustomDataType.proto";
import "types/enums/UpdateEnumType.proto";

message SendLocalListRequest {
  OCPP.v201.types.CustomDataType customData = 1;
  repeated OCPP.v201.types.AuthorizationData localAuthorizationList = 2;
  // NOTE: This field is required by standard Spec.
  int32 versionNumber = 3;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.enums.updateenumtype.UpdateEnumType updateType = 4;
}