syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/CustomDataType.proto";
import "types/enums/DataEnumType.proto";

message VariableCharacteristicsType {
  OCPP.v201.types.CustomDataType customData = 1;
  string unit = 2;
  OCPP.v201.types.enums.dataenumtype.DataEnumType dataType = 3;
  double minLimit = 4;
  double maxLimit = 5;
  string valuesList = 6;
  bool supportsMonitoring = 7;
}
