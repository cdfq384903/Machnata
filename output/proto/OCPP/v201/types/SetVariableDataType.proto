syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/ComponentType.proto";
import "types/CustomDataType.proto";
import "types/VariableType.proto";
import "types/enums/AttributeEnumType.proto";

message SetVariableDataType {
  OCPP.v201.types.CustomDataType customData = 1;
  OCPP.v201.types.enums.attributeenumtype.AttributeEnumType attributeType = 2;
  string attributeValue = 3;
  OCPP.v201.types.ComponentType component = 4;
  OCPP.v201.types.VariableType variable = 5;
}
