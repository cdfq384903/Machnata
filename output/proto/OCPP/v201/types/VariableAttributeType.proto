syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/CustomDataType.proto";
import "types/enums/AttributeEnumType.proto";
import "types/enums/MutabilityEnumType.proto";

message VariableAttributeType {
  OCPP.v201.types.CustomDataType customData = 1;
  OCPP.v201.types.enums.attributeenumtype.AttributeEnumType type = 2;
  string value = 3;
  OCPP.v201.types.enums.mutabilityenumtype.MutabilityEnumType mutability = 4;
  bool persistent = 5;
  bool constant = 6;
}
