syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/CustomDataType.proto";
import "types/SalesTariffEntryType.proto";

message SalesTariffType {
  OCPP.v201.types.CustomDataType customData = 1;
  int32 id = 2;
  string salesTariffDescription = 3;
  int32 numEPriceLevels = 4;
  repeated OCPP.v201.types.SalesTariffEntryType salesTariffEntry = 5;
}
