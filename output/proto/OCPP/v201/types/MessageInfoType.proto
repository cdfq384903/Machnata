syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/ComponentType.proto";
import "types/CustomDataType.proto";
import "types/MessageContentType.proto";
import "types/enums/MessagePriorityEnumType.proto";
import "types/enums/MessageStateEnumType.proto";

message MessageInfoType {
  OCPP.v201.types.CustomDataType customData = 1;
  OCPP.v201.types.ComponentType display = 2;
  int32 id = 3;
  OCPP.v201.types.enums.messagepriorityenumtype.MessagePriorityEnumType priority = 4;
  OCPP.v201.types.enums.messagestateenumtype.MessageStateEnumType state = 5;
  string startDateTime = 6;
  string endDateTime = 7;
  string transactionId = 8;
  OCPP.v201.types.MessageContentType message = 9;
}
