syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/CustomDataType.proto";
import "types/enums/VPNEnumType.proto";

message VPNType {
  OCPP.v201.types.CustomDataType customData = 1;
  string server = 2;
  string user = 3;
  string group = 4;
  string password = 5;
  string key = 6;
  OCPP.v201.types.enums.vpnenumtype.VPNEnumType type = 7;
}
