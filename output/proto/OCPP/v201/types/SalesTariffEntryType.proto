syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/ConsumptionCostType.proto";
import "types/CustomDataType.proto";
import "types/RelativeTimeIntervalType.proto";

message SalesTariffEntryType {
  OCPP.v201.types.CustomDataType customData = 1;
  OCPP.v201.types.RelativeTimeIntervalType relativeTimeInterval = 2;
  int32 ePriceLevel = 3;
  repeated OCPP.v201.types.ConsumptionCostType consumptionCost = 4;
}
