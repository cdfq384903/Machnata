syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/CustomDataType.proto";
import "types/IdTokenType.proto";
import "types/MessageContentType.proto";
import "types/enums/AuthorizationStatusEnumType.proto";

message IdTokenInfoType {
  OCPP.v201.types.CustomDataType customData = 1;
  OCPP.v201.types.enums.authorizationstatusenumtype.AuthorizationStatusEnumType status = 2;
  string cacheExpiryDateTime = 3;
  int32 chargingPriority = 4;
  string language1 = 5;
  repeated int32 evseId = 6;
  OCPP.v201.types.IdTokenType groupIdToken = 7;
  string language2 = 8;
  OCPP.v201.types.MessageContentType personalMessage = 9;
}
