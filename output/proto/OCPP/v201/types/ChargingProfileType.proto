syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/ChargingScheduleType.proto";
import "types/CustomDataType.proto";
import "types/enums/ChargingProfileKindEnumType.proto";
import "types/enums/ChargingProfilePurposeEnumType.proto";
import "types/enums/RecurrencyKindEnumType.proto";

message ChargingProfileType {
  OCPP.v201.types.CustomDataType customData = 1;
  int32 id = 2;
  int32 stackLevel = 3;
  OCPP.v201.types.enums.chargingprofilepurposeenumtype.ChargingProfilePurposeEnumType chargingProfilePurpose = 4;
  OCPP.v201.types.enums.chargingprofilekindenumtype.ChargingProfileKindEnumType chargingProfileKind = 5;
  OCPP.v201.types.enums.recurrencykindenumtype.RecurrencyKindEnumType recurrencyKind = 6;
  string validFrom = 7;
  string validTo = 8;
  repeated OCPP.v201.types.ChargingScheduleType chargingSchedule = 9;
  string transactionId = 10;
}
