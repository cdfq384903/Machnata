syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/CustomDataType.proto";

message DCChargingParametersType {
  OCPP.v201.types.CustomDataType customData = 1;
  int32 evMaxCurrent = 2;
  int32 evMaxVoltage = 3;
  int32 energyAmount = 4;
  int32 evMaxPower = 5;
  int32 stateOfCharge = 6;
  int32 evEnergyCapacity = 7;
  int32 fullSoC = 8;
  int32 bulkSoC = 9;
}
