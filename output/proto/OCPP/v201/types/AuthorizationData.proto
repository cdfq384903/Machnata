syntax = "proto3";
package OCPP.v201.types;
option go_package = "tmp/v201/types;types";
option csharp_namespace = "OCPP.v201.types";

import "types/CustomDataType.proto";
import "types/IdTokenInfoType.proto";
import "types/IdTokenType.proto";

message AuthorizationData {
  OCPP.v201.types.CustomDataType customData = 1;
  OCPP.v201.types.IdTokenType idToken = 2;
  OCPP.v201.types.IdTokenInfoType idTokenInfo = 3;
}
