syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/CustomDataType.proto";
import "types/IdTokenType.proto";
import "types/enums/ConnectorEnumType.proto";

message ReserveNowRequest {
  OCPP.v201.types.CustomDataType customData = 1;
  // NOTE: This field is required by standard Spec.
  int32 id = 2;
  // NOTE: This field is required by standard Spec.
  string expiryDateTime = 3;
  OCPP.v201.types.enums.connectorenumtype.ConnectorEnumType connectorType = 4;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.IdTokenType idToken = 5;
  int32 evseId = 6;
  OCPP.v201.types.IdTokenType groupIdToken = 7;
}