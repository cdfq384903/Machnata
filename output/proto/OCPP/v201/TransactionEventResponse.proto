syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/CustomDataType.proto";
import "types/IdTokenInfoType.proto";
import "types/MessageContentType.proto";

message TransactionEventResponse {
  OCPP.v201.types.CustomDataType customData = 1;
  double totalCost = 2;
  int32 chargingPriority = 3;
  OCPP.v201.types.IdTokenInfoType idTokenInfo = 4;
  OCPP.v201.types.MessageContentType updatedPersonalMessage = 5;
}