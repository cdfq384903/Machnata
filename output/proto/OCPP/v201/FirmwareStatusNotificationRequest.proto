syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/CustomDataType.proto";
import "types/enums/FirmwareStatusEnumType.proto";

message FirmwareStatusNotificationRequest {
  OCPP.v201.types.CustomDataType customData = 1;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.enums.firmwarestatusenumtype.FirmwareStatusEnumType status = 2;
  int32 requestId = 3;
}