syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/ChargingNeedsType.proto";
import "types/CustomDataType.proto";

message NotifyEVChargingNeedsRequest {
  OCPP.v201.types.CustomDataType customData = 1;
  int32 maxScheduleTuples = 2;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.ChargingNeedsType chargingNeeds = 3;
  // NOTE: This field is required by standard Spec.
  int32 evseId = 4;
}