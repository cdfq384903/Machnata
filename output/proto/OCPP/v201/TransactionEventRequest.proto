syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/CustomDataType.proto";
import "types/EVSEType.proto";
import "types/IdTokenType.proto";
import "types/MeterValueType.proto";
import "types/TransactionType.proto";
import "types/enums/TransactionEventEnumType.proto";
import "types/enums/TriggerReasonEnumType.proto";

message TransactionEventRequest {
  OCPP.v201.types.CustomDataType customData = 1;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.enums.transactioneventenumtype.TransactionEventEnumType eventType = 2;
  repeated OCPP.v201.types.MeterValueType meterValue = 3;
  // NOTE: This field is required by standard Spec.
  string timestamp = 4;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.enums.triggerreasonenumtype.TriggerReasonEnumType triggerReason = 5;
  // NOTE: This field is required by standard Spec.
  int32 seqNo = 6;
  bool offline = 7;
  int32 numberOfPhasesUsed = 8;
  int32 cableMaxCurrent = 9;
  int32 reservationId = 10;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.TransactionType transactionInfo = 11;
  OCPP.v201.types.EVSEType evse = 12;
  OCPP.v201.types.IdTokenType idToken = 13;
}