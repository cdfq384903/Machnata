syntax = "proto3";
package OCPP.v201;
option go_package = "tmp/v201;OCPPv201";
option csharp_namespace = "OCPP.v201";

import "types/ChargingScheduleType.proto";
import "types/CustomDataType.proto";

message NotifyEVChargingScheduleRequest {
  OCPP.v201.types.CustomDataType customData = 1;
  // NOTE: This field is required by standard Spec.
  string timeBase = 2;
  // NOTE: This field is required by standard Spec.
  OCPP.v201.types.ChargingScheduleType chargingSchedule = 3;
  // NOTE: This field is required by standard Spec.
  int32 evseId = 4;
}