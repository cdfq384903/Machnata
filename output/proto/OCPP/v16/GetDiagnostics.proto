syntax = "proto3";
package OCPP.v16;
option go_package = "tmp/v16;OCPPv16";
option csharp_namespace = "OCPP.v16";


message GetDiagnostics {
  // NOTE: This field is required by standard Spec.
  string location = 1;
  int32 retries = 2;
  int32 retryInterval = 3;
  string startTime = 4;
  string stopTime = 5;
}