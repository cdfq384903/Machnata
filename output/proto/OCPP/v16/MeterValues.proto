syntax = "proto3";
package OCPP.v16;
option go_package = "tmp/v16;OCPPv16";
option csharp_namespace = "OCPP.v16";

import "types/MeterValues_meterValue_item.proto";

message MeterValues {
  // NOTE: This field is required by standard Spec.
  int32 connectorId = 1;
  int32 transactionId = 2;
  // NOTE: This field is required by standard Spec.
  repeated OCPP.v16.types.MeterValues_meterValue_item meterValue = 3;
}