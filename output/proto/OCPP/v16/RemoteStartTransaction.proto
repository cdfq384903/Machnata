syntax = "proto3";
package OCPP.v16;
option go_package = "tmp/v16;OCPPv16";
option csharp_namespace = "OCPP.v16";

import "types/RemoteStartTransaction_chargingProfile.proto";

message RemoteStartTransaction {
  int32 connectorId = 1;
  // NOTE: This field is required by standard Spec.
  string idTag = 2;
  OCPP.v16.types.RemoteStartTransaction_chargingProfile chargingProfile = 3;
}