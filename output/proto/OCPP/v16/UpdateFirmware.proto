syntax = "proto3";
package OCPP.v16;
option go_package = "tmp/v16;OCPPv16";
option csharp_namespace = "OCPP.v16";


message UpdateFirmware {
  // NOTE: This field is required by standard Spec.
  string location = 1;
  int32 retries = 2;
  // NOTE: This field is required by standard Spec.
  string retrieveDate = 3;
  int32 retryInterval = 4;
}