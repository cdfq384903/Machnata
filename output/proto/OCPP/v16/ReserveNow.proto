syntax = "proto3";
package OCPP.v16;
option go_package = "tmp/v16;OCPPv16";
option csharp_namespace = "OCPP.v16";


message ReserveNow {
  // NOTE: This field is required by standard Spec.
  int32 connectorId = 1;
  // NOTE: This field is required by standard Spec.
  string expiryDate = 2;
  // NOTE: This field is required by standard Spec.
  string idTag = 3;
  string parentIdTag = 4;
  // NOTE: This field is required by standard Spec.
  int32 reservationId = 5;
}