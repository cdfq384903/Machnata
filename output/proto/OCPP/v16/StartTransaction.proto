syntax = "proto3";
package OCPP.v16;
option go_package = "tmp/v16;OCPPv16";
option csharp_namespace = "OCPP.v16";


message StartTransaction {
  // NOTE: This field is required by standard Spec.
  int32 connectorId = 1;
  // NOTE: This field is required by standard Spec.
  string idTag = 2;
  // NOTE: This field is required by standard Spec.
  int32 meterStart = 3;
  int32 reservationId = 4;
  // NOTE: This field is required by standard Spec.
  string timestamp = 5;
}