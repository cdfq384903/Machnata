syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/ChargingProfileCriterionType.proto";
import "types/CustomDataType.proto";

message GetChargingProfilesRequest {
  // NOTE: This field is required by standard Spec.
  int32 requestId = 1;
  int32 evseId = 2;
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.ChargingProfileCriterionType chargingProfile = 3;
  OCPP.v21.types.CustomDataType customData = 4;
}