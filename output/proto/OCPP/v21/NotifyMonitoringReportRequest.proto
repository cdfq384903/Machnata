syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/MonitoringDataType.proto";

message NotifyMonitoringReportRequest {
  repeated OCPP.v21.types.MonitoringDataType monitor = 1;
  // NOTE: This field is required by standard Spec.
  int32 requestId = 2;
  bool tbc = 3;
  // NOTE: This field is required by standard Spec.
  int32 seqNo = 4;
  // NOTE: This field is required by standard Spec.
  string generatedAt = 5;
  OCPP.v21.types.CustomDataType customData = 6;
}