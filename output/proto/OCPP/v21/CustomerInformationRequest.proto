syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CertificateHashDataType.proto";
import "types/CustomDataType.proto";
import "types/IdTokenType.proto";

message CustomerInformationRequest {
  OCPP.v21.types.CertificateHashDataType customerCertificate = 1;
  OCPP.v21.types.IdTokenType idToken = 2;
  // NOTE: This field is required by standard Spec.
  int32 requestId = 3;
  // NOTE: This field is required by standard Spec.
  bool report = 4;
  // NOTE: This field is required by standard Spec.
  bool clear = 5;
  string customerIdentifier = 6;
  OCPP.v21.types.CustomDataType customData = 7;
}