syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/StatusInfoType.proto";
import "types/enums/PublishFirmwareStatusEnumType.proto";

message PublishFirmwareStatusNotificationRequest {
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.enums.publishfirmwarestatusenumtype.PublishFirmwareStatusEnumType status = 1;
  repeated string location = 2;
  int32 requestId = 3;
  OCPP.v21.types.StatusInfoType statusInfo = 4;
  OCPP.v21.types.CustomDataType customData = 5;
}