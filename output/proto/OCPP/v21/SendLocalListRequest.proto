syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/AuthorizationData.proto";
import "types/CustomDataType.proto";
import "types/enums/UpdateEnumType.proto";

message SendLocalListRequest {
  repeated OCPP.v21.types.AuthorizationData localAuthorizationList = 1;
  // NOTE: This field is required by standard Spec.
  int32 versionNumber = 2;
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.enums.updateenumtype.UpdateEnumType updateType = 3;
  OCPP.v21.types.CustomDataType customData = 4;
}