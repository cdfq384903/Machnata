syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/ReportDataType.proto";

message NotifyReportRequest {
  // NOTE: This field is required by standard Spec.
  int32 requestId = 1;
  // NOTE: This field is required by standard Spec.
  string generatedAt = 2;
  repeated OCPP.v21.types.ReportDataType reportData = 3;
  bool tbc = 4;
  // NOTE: This field is required by standard Spec.
  int32 seqNo = 5;
  OCPP.v21.types.CustomDataType customData = 6;
}