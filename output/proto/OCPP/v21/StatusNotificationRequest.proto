syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/enums/ConnectorStatusEnumType.proto";

message StatusNotificationRequest {
  // NOTE: This field is required by standard Spec.
  string timestamp = 1;
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.enums.connectorstatusenumtype.ConnectorStatusEnumType connectorStatus = 2;
  // NOTE: This field is required by standard Spec.
  int32 evseId = 3;
  // NOTE: This field is required by standard Spec.
  int32 connectorId = 4;
  OCPP.v21.types.CustomDataType customData = 5;
}