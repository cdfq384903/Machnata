syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/ClearChargingProfileType.proto";
import "types/CustomDataType.proto";

message ClearChargingProfileRequest {
  int32 chargingProfileId = 1;
  OCPP.v21.types.ClearChargingProfileType chargingProfileCriteria = 2;
  OCPP.v21.types.CustomDataType customData = 3;
}