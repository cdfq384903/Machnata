syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/enums/MessagePriorityEnumType.proto";
import "types/enums/MessageStateEnumType.proto";

message GetDisplayMessagesRequest {
  repeated int32 id = 1;
  // NOTE: This field is required by standard Spec.
  int32 requestId = 2;
  OCPP.v21.types.enums.messagepriorityenumtype.MessagePriorityEnumType priority = 3;
  OCPP.v21.types.enums.messagestateenumtype.MessageStateEnumType state = 4;
  OCPP.v21.types.CustomDataType customData = 5;
}