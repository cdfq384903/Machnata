syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/enums/CertificateSigningUseEnumType.proto";

message CertificateSignedRequest {
  // NOTE: This field is required by standard Spec.
  string certificateChain = 1;
  OCPP.v21.types.enums.certificatesigninguseenumtype.CertificateSigningUseEnumType certificateType = 2;
  int32 requestId = 3;
  OCPP.v21.types.CustomDataType customData = 4;
}