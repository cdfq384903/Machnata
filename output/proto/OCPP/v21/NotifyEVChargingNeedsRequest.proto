syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/ChargingNeedsType.proto";
import "types/CustomDataType.proto";

message NotifyEVChargingNeedsRequest {
  // NOTE: This field is required by standard Spec.
  int32 evseId = 1;
  int32 maxScheduleTuples = 2;
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.ChargingNeedsType chargingNeeds = 3;
  string timestamp = 4;
  OCPP.v21.types.CustomDataType customData = 5;
}