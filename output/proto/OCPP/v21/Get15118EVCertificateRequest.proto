syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/enums/CertificateActionEnumType.proto";

message Get15118EVCertificateRequest {
