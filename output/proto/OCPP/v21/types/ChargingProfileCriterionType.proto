syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/CustomDataType.proto";
import "types/enums/ChargingProfilePurposeEnumType.proto";

message ChargingProfileCriterionType {
  OCPP.v21.types.enums.chargingprofilepurposeenumtype.ChargingProfilePurposeEnumType chargingProfilePurpose = 1;
  int32 stackLevel = 2;
  repeated int32 chargingProfileId = 3;
  repeated string chargingLimitSource = 4;
  OCPP.v21.types.CustomDataType customData = 5;
}
