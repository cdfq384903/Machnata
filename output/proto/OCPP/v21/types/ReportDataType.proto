syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/ComponentType.proto";
import "types/CustomDataType.proto";
import "types/VariableAttributeType.proto";
import "types/VariableCharacteristicsType.proto";
import "types/VariableType.proto";

message ReportDataType {
  OCPP.v21.types.ComponentType component = 1;
  OCPP.v21.types.VariableType variable = 2;
  repeated OCPP.v21.types.VariableAttributeType variableAttribute = 3;
  OCPP.v21.types.VariableCharacteristicsType variableCharacteristics = 4;
  OCPP.v21.types.CustomDataType customData = 5;
}
