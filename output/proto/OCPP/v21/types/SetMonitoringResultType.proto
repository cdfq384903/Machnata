syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/ComponentType.proto";
import "types/CustomDataType.proto";
import "types/StatusInfoType.proto";
import "types/VariableType.proto";
import "types/enums/MonitorEnumType.proto";
import "types/enums/SetMonitoringStatusEnumType.proto";

message SetMonitoringResultType {
  int32 id = 1;
  OCPP.v21.types.StatusInfoType statusInfo = 2;
  OCPP.v21.types.enums.setmonitoringstatusenumtype.SetMonitoringStatusEnumType status = 3;
  OCPP.v21.types.enums.monitorenumtype.MonitorEnumType type = 4;
  OCPP.v21.types.ComponentType component = 5;
  OCPP.v21.types.VariableType variable = 6;
  int32 severity = 7;
  OCPP.v21.types.CustomDataType customData = 8;
}
