syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/ComponentType.proto";
import "types/CustomDataType.proto";
import "types/StatusInfoType.proto";
import "types/VariableType.proto";
import "types/enums/AttributeEnumType.proto";
import "types/enums/GetVariableStatusEnumType.proto";

message GetVariableResultType {
  OCPP.v21.types.enums.getvariablestatusenumtype.GetVariableStatusEnumType attributeStatus = 1;
  OCPP.v21.types.StatusInfoType attributeStatusInfo = 2;
  OCPP.v21.types.enums.attributeenumtype.AttributeEnumType attributeType = 3;
