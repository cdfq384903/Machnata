syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/CustomDataType.proto";
import "types/IdTokenInfoType.proto";
import "types/IdTokenType.proto";

message AuthorizationData {
  OCPP.v21.types.IdTokenType idToken = 1;
  OCPP.v21.types.IdTokenInfoType idTokenInfo = 2;
  OCPP.v21.types.CustomDataType customData = 3;
}
