syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/ComponentType.proto";
import "types/CustomDataType.proto";
import "types/PeriodicEventStreamParamsType.proto";
import "types/VariableType.proto";
import "types/enums/MonitorEnumType.proto";

message SetMonitoringDataType {
  int32 id = 1;
  OCPP.v21.types.PeriodicEventStreamParamsType periodicEventStream = 2;
  bool transaction = 3;
  double value = 4;
  OCPP.v21.types.enums.monitorenumtype.MonitorEnumType type = 5;
  int32 severity = 6;
  OCPP.v21.types.ComponentType component = 7;
  OCPP.v21.types.VariableType variable = 8;
  OCPP.v21.types.CustomDataType customData = 9;
}
