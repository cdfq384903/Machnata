syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/CustomDataType.proto";
import "types/enums/HashAlgorithmEnumType.proto";

message CertificateHashDataType {
  OCPP.v21.types.enums.hashalgorithmenumtype.HashAlgorithmEnumType hashAlgorithm = 1;
  string issuerNameHash = 2;
  string issuerKeyHash = 3;
  string serialNumber = 4;
  OCPP.v21.types.CustomDataType customData = 5;
}
