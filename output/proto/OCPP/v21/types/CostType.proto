syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/CustomDataType.proto";
import "types/enums/CostKindEnumType.proto";

message CostType {
  OCPP.v21.types.enums.costkindenumtype.CostKindEnumType costKind = 1;
  int32 amount = 2;
  int32 amountMultiplier = 3;
  OCPP.v21.types.CustomDataType customData = 4;
}
