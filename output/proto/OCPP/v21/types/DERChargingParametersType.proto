  double evOverExcitedMaxDischargePower = 2;
  double evOverExcitedPowerFactor = 3;
  double evUnderExcitedMaxDischargePower = 4;
  double evUnderExcitedPowerFactor = 5;
  double maxApparentPower = 6;
  double maxChargeApparentPower = 7;
