syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/CustomDataType.proto";
import "types/enums/DERControlEnumType.proto";
import "types/enums/IslandingDetectionEnumType.proto";

message DERChargingParametersType {
