  double maxChargeApparentPower_L3 = 9;
  double maxDischargeApparentPower = 10;
  double maxDischargeApparentPower_L2 = 11;
  double maxDischargeApparentPower_L3 = 12;
  double maxChargeReactivePower = 13;
  double maxChargeReactivePower_L2 = 14;
  double maxChargeReactivePower_L3 = 15;
  double minChargeReactivePower = 16;
  double minChargeReactivePower_L2 = 17;
  double minChargeReactivePower_L3 = 18;
  double maxDischargeReactivePower = 19;
  double maxDischargeReactivePower_L2 = 20;
