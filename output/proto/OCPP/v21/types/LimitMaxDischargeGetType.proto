syntax = "proto3";
package OCPP.v21.types;
option go_package = "tmp/v21/types;types";
option csharp_namespace = "OCPP.v21.types";

import "types/CustomDataType.proto";
import "types/LimitMaxDischargeType.proto";

message LimitMaxDischargeGetType {
  string id = 1;
  bool isDefault = 2;
  bool isSuperseded = 3;
  OCPP.v21.types.LimitMaxDischargeType limitMaxDischarge = 4;
  OCPP.v21.types.CustomDataType customData = 5;
}
