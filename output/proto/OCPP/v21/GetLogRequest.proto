syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/LogParametersType.proto";
import "types/enums/LogEnumType.proto";

message GetLogRequest {
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.LogParametersType log = 1;
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.enums.logenumtype.LogEnumType logType = 2;
  // NOTE: This field is required by standard Spec.
  int32 requestId = 3;
  int32 retries = 4;
  int32 retryInterval = 5;
  OCPP.v21.types.CustomDataType customData = 6;
}