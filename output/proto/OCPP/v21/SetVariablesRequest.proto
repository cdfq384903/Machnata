syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/SetVariableDataType.proto";

message SetVariablesRequest {
  // NOTE: This field is required by standard Spec.
  repeated OCPP.v21.types.SetVariableDataType setVariableData = 1;
  OCPP.v21.types.CustomDataType customData = 2;
}