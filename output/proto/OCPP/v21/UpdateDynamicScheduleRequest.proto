syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/ChargingScheduleUpdateType.proto";
import "types/CustomDataType.proto";

message UpdateDynamicScheduleRequest {
  // NOTE: This field is required by standard Spec.
  int32 chargingProfileId = 1;
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.ChargingScheduleUpdateType scheduleUpdate = 2;
  OCPP.v21.types.CustomDataType customData = 3;
}