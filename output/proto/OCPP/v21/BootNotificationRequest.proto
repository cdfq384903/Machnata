syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/ChargingStationType.proto";
import "types/CustomDataType.proto";
import "types/enums/BootReasonEnumType.proto";

message BootNotificationRequest {
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.ChargingStationType chargingStation = 1;
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.enums.bootreasonenumtype.BootReasonEnumType reason = 2;
  OCPP.v21.types.CustomDataType customData = 3;
}