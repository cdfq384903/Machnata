syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/MeterValueType.proto";

message MeterValuesRequest {
  // NOTE: This field is required by standard Spec.
  int32 evseId = 1;
  // NOTE: This field is required by standard Spec.
  repeated OCPP.v21.types.MeterValueType meterValue = 2;
  OCPP.v21.types.CustomDataType customData = 3;
}