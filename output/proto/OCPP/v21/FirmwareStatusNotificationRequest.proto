syntax = "proto3";
package OCPP.v21;
option go_package = "tmp/v21;OCPPv21";
option csharp_namespace = "OCPP.v21";

import "types/CustomDataType.proto";
import "types/StatusInfoType.proto";
import "types/enums/FirmwareStatusEnumType.proto";

message FirmwareStatusNotificationRequest {
  // NOTE: This field is required by standard Spec.
  OCPP.v21.types.enums.firmwarestatusenumtype.FirmwareStatusEnumType status = 1;
  int32 requestId = 2;
  OCPP.v21.types.StatusInfoType statusInfo = 3;
  OCPP.v21.types.CustomDataType customData = 4;
}